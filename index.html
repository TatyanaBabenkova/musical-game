<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Музыкальная игра — расширенный секвенсор</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: #1a1f2b;
        --panel-soft: #232a3a;
        --line: #313a4f;
        --accent: #7c9bff;
        --accent-2: #45d7c7;
        --danger: #ff6b81;
        --text: #e6e9f2;
        --muted: #9aa3bd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #171d2d, var(--bg) 40%);
        color: var(--text);
        font-family: Inter, Segoe UI, sans-serif;
      }

      .app {
        max-width: 1500px;
        margin: 20px auto;
        padding: 14px;
      }

      .panel {
        background: rgba(26, 31, 43, 0.94);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .toolbar-group {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      button,
      input,
      select {
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      button[data-state='active'] {
        border-color: var(--accent-2);
        box-shadow: 0 0 0 1px var(--accent-2) inset;
      }

      .primary {
        background: linear-gradient(130deg, #3f63ff, #6f86ff);
        border: 0;
      }

      .danger {
        border-color: #7b3142;
        color: #ffc1cc;
      }

      .tempo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tempo output {
        min-width: 44px;
        color: var(--accent-2);
      }

      .grid-wrap {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: auto;
        max-height: 68vh;
      }

      .grid-header,
      .grid-row {
        display: grid;
        grid-template-columns: 210px repeat(var(--steps), minmax(26px, 1fr));
        min-width: max-content;
      }

      .grid-header {
        position: sticky;
        top: 0;
        z-index: 2;
        background: #1b2231;
      }

      .grid-header div,
      .grid-row > div {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        min-height: 30px;
      }

      .grid-header .step {
        display: grid;
        place-items: center;
        font-size: 11px;
        color: var(--muted);
      }

      .track-label {
        padding: 6px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
      }

      .instrument-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
      }

      .cell {
        background: #171d2a;
        cursor: pointer;
        position: relative;
      }

      .cell.bar-start {
        box-shadow: -1px 0 0 0 #5f6a88 inset;
      }

      .cell.active {
        background: linear-gradient(180deg, rgba(69, 215, 199, 0.25), rgba(69, 215, 199, 0.52));
      }

      .cell.playhead::after {
        content: '';
        position: absolute;
        inset: 1px;
        border: 1px solid rgba(124, 155, 255, 0.95);
        border-radius: 4px;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #8f99b6;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="toolbar">
          <div class="toolbar-group">
            <button id="playBtn" class="primary">▶ Play</button>
            <button id="recBtn">⏺ Rec</button>
            <button id="stopBtn" class="danger">■ Stop</button>
          </div>

          <div class="toolbar-group tempo">
            <label for="tempo">Темп:</label>
            <input id="tempo" type="range" min="80" max="160" value="110" />
            <output id="tempoValue">110</output>
            <span>bpm</span>
          </div>

          <div class="toolbar-group">
            <label for="stepsCount">Шагов:</label>
            <select id="stepsCount">
              <option value="16">16</option>
              <option value="32" selected>32</option>
              <option value="64">64</option>
              <option value="128">128</option>
              <option value="192">192</option>
            </select>
            <input id="trackName" type="text" placeholder="Название трека" value="Демо-трек" />
            <button id="saveAudio">Сохранить WAV (3 мин)</button>
            <button id="saveProject">Сохранить проект</button>
            <button id="loadLocal">Загрузить</button>
            <button id="exportJson">Экспорт JSON</button>
          </div>
        </div>

        <div class="grid-wrap">
          <div class="grid-header" id="gridHeader"></div>
          <div id="gridBody"></div>
        </div>

        <div class="meta">
          <span id="status">Статус: готово</span>
          <span id="barInfo">Текущий шаг: —</span>
        </div>

        <p class="hint">
          В расширенной версии больше дорожек (бочка, рабочий, хэты, томы и т.д.) и до 192 шагов.
        </p>

        <div class="toolbar-group" style="margin-top: 10px">
          <span style="color: var(--muted); font-size: 13px">Готовые мелодии:</span>
          <button id="presetYolochka">В лесу родилась ёлочка</button>
          <button id="presetKatyusha">Катюша</button>
        </div>
      </section>
    </main>

    <script>
      const NOTE_ATTACK = 0.01;
      const NOTE_DECAY = 0.32;
      const NOTE_VOLUME = 0.2;
      const WAV_EXPORT_DURATION_SECONDS = 180;
      const WAV_SAMPLE_RATE = 22050;

      const tracks = [
        { id: 'kick', name: 'Бочка (Kick)', color: '#f97316', freq: 65, type: 'sine' },
        { id: 'snare', name: 'Рабочий (Snare)', color: '#fb7185', freq: 190, type: 'triangle' },
        { id: 'hihatClosed', name: 'Хэт закрытый', color: '#facc15', freq: 1900, type: 'square' },
        { id: 'hihatOpen', name: 'Хэт открытый', color: '#f59e0b', freq: 1450, type: 'triangle' },
        { id: 'clap', name: 'Клэп', color: '#fda4af', freq: 900, type: 'square' },
        { id: 'tom', name: 'Том', color: '#fb923c', freq: 130, type: 'sine' },
        { id: 'crash', name: 'Крэш', color: '#fde047', freq: 2200, type: 'sawtooth' },
        { id: 'ride', name: 'Райд', color: '#fcd34d', freq: 1700, type: 'triangle' },
        { id: 'bass', name: 'Бас', color: '#ef4444', freq: 110, type: 'sine' },
        { id: 'guitar', name: 'Гитара', color: '#22c55e', freq: 220, type: 'sawtooth' },
        { id: 'synthPad', name: 'Синт-пэд', color: '#38bdf8', freq: 300, type: 'triangle' },
        { id: 'lead', name: 'Лид', color: '#a78bfa', freq: 440, type: 'square' },
      ];

      const state = {
        steps: 32,
        tempo: 110,
        currentStep: 0,
        isPlaying: false,
        isRecording: false,
        timerId: null,
        sequence: {},
        pitchMap: {},
      };

      const els = {
        gridHeader: document.getElementById('gridHeader'),
        gridBody: document.getElementById('gridBody'),
        tempo: document.getElementById('tempo'),
        tempoValue: document.getElementById('tempoValue'),
        playBtn: document.getElementById('playBtn'),
        recBtn: document.getElementById('recBtn'),
        stopBtn: document.getElementById('stopBtn'),
        saveAudio: document.getElementById('saveAudio'),
        saveProject: document.getElementById('saveProject'),
        loadLocal: document.getElementById('loadLocal'),
        exportJson: document.getElementById('exportJson'),
        trackName: document.getElementById('trackName'),
        status: document.getElementById('status'),
        barInfo: document.getElementById('barInfo'),
        stepsCount: document.getElementById('stepsCount'),
        presetYolochka: document.getElementById('presetYolochka'),
        presetKatyusha: document.getElementById('presetKatyusha'),
      };

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function midiToFreq(midi) {
        return 440 * 2 ** ((midi - 69) / 12);
      }

      const presets = {
        yolochka: {
          label: 'В лесу родилась ёлочка',
          tempo: 102,
          steps: 64,
          sequence: {
            kick: [0, 8, 16, 24, 32, 40, 48, 56],
            snare: [4, 12, 20, 28, 36, 44, 52, 60],
            hihatClosed: [2, 6, 10, 14, 18, 22, 26, 30, 34, 38, 42, 46, 50, 54, 58, 62],
            bass: [0, 8, 16, 24, 32, 40, 48, 56],
            synthPad: [0, 16, 32, 48],
          },
          melody: {
            lead: [
              { step: 0, midi: 64 },
              { step: 4, midi: 64 },
              { step: 8, midi: 64 },
              { step: 12, midi: 60 },
              { step: 16, midi: 64 },
              { step: 20, midi: 67 },
              { step: 24, midi: 67 },
              { step: 28, midi: 65 },
              { step: 32, midi: 64 },
              { step: 36, midi: 62 },
              { step: 40, midi: 60 },
              { step: 44, midi: 62 },
              { step: 48, midi: 64 },
              { step: 52, midi: 64 },
              { step: 56, midi: 64 },
              { step: 60, midi: 64 },
            ],
          },
        },
        katyusha: {
          label: 'Катюша',
          tempo: 120,
          steps: 64,
          sequence: {
            kick: [0, 8, 12, 16, 24, 28, 32, 40, 44, 48, 56, 60],
            snare: [4, 20, 36, 52],
            hihatClosed: [2, 6, 10, 14, 18, 22, 26, 30, 34, 38, 42, 46, 50, 54, 58, 62],
            clap: [20, 52],
            bass: [0, 8, 16, 24, 32, 40, 48, 56],
            guitar: [0, 8, 16, 24, 32, 40, 48, 56],
          },
          melody: {
            lead: [
              { step: 0, midi: 67 },
              { step: 4, midi: 69 },
              { step: 8, midi: 71 },
              { step: 12, midi: 72 },
              { step: 16, midi: 71 },
              { step: 20, midi: 69 },
              { step: 24, midi: 67 },
              { step: 28, midi: 64 },
              { step: 32, midi: 67 },
              { step: 36, midi: 69 },
              { step: 40, midi: 71 },
              { step: 44, midi: 72 },
              { step: 48, midi: 74 },
              { step: 52, midi: 72 },
              { step: 56, midi: 71 },
              { step: 60, midi: 69 },
            ],
          },
        },
      };

      function resetSequence(newSteps) {
        state.steps = newSteps;
        document.documentElement.style.setProperty('--steps', String(newSteps));
        const next = {};
        tracks.forEach((track) => {
          const old = state.sequence[track.id] || [];
          next[track.id] = Array.from({ length: newSteps }, (_, i) => Boolean(old[i]));
        });
        state.sequence = next;

        const nextPitchMap = {};
        tracks.forEach((track) => {
          const oldPitch = state.pitchMap[track.id] || [];
          nextPitchMap[track.id] = Array.from({ length: newSteps }, (_, i) => oldPitch[i] ?? null);
        });
        state.pitchMap = nextPitchMap;

        if (state.currentStep >= newSteps) state.currentStep = 0;
      }

      function buildGrid() {
        const headerCells = ['<div class="track-label">Инструмент</div>'];
        for (let i = 1; i <= state.steps; i += 1) {
          headerCells.push(`<div class="step">${i}</div>`);
        }
        els.gridHeader.innerHTML = headerCells.join('');

        const rows = tracks
          .map((track) => {
            const label = `<div class="track-label"><span>${track.name}</span><span class="instrument-dot" style="background:${track.color}"></span></div>`;
            const cells = Array.from({ length: state.steps }, (_, step) => {
              const barStart = step % 4 === 0 ? 'bar-start' : '';
              return `<div class="cell ${barStart}" data-track="${track.id}" data-step="${step}"></div>`;
            }).join('');
            return `<div class="grid-row">${label}${cells}</div>`;
          })
          .join('');

        els.gridBody.innerHTML = rows;
      }

      function updateStatus(text) {
        els.status.textContent = `Статус: ${text}`;
      }

      function updateTempoDisplay() {
        els.tempoValue.value = state.tempo;
      }

      function cellSelector(trackId, step) {
        return `.cell[data-track="${trackId}"][data-step="${step}"]`;
      }

      function renderGrid() {
        tracks.forEach((track) => {
          state.sequence[track.id].forEach((value, step) => {
            const cell = document.querySelector(cellSelector(track.id, step));
            if (!cell) return;
            cell.classList.toggle('active', value);
            cell.classList.toggle('playhead', step === state.currentStep && state.isPlaying);
          });
        });
        els.barInfo.textContent = state.isPlaying
          ? `Текущий шаг: ${state.currentStep + 1} / ${state.steps}`
          : 'Текущий шаг: —';
      }

      function createNoteEnvelope(gain, startAt) {
        gain.gain.setValueAtTime(0.001, startAt);
        gain.gain.exponentialRampToValueAtTime(NOTE_VOLUME, startAt + NOTE_ATTACK);
        gain.gain.exponentialRampToValueAtTime(0.001, startAt + NOTE_DECAY);
      }

      function playNote(track, freqOverride = null) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = track.type;
        osc.frequency.value = freqOverride ?? track.freq;
        createNoteEnvelope(gain, now);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + NOTE_DECAY + 0.02);
      }

      function stepDurationMs() {
        return (60_000 / state.tempo) / 4;
      }

      function tick() {
        tracks.forEach((track) => {
          if (state.sequence[track.id][state.currentStep]) {
            const freq = state.pitchMap[track.id][state.currentStep] ?? track.freq;
            playNote(track, freq);
          }
        });
        renderGrid();
        state.currentStep = (state.currentStep + 1) % state.steps;
      }

      function startPlayback() {
        if (state.isPlaying) return;
        state.isPlaying = true;
        audioCtx.resume();
        tick();
        state.timerId = setInterval(tick, stepDurationMs());
        updateStatus(state.isRecording ? 'запись и воспроизведение' : 'воспроизведение');
        els.playBtn.dataset.state = 'active';
      }

      function stopPlayback() {
        state.isPlaying = false;
        state.currentStep = 0;
        clearInterval(state.timerId);
        state.timerId = null;
        els.playBtn.dataset.state = '';
        renderGrid();
        updateStatus(state.isRecording ? 'запись остановлена' : 'остановлено');
      }

      function toggleRecording() {
        state.isRecording = !state.isRecording;
        els.recBtn.dataset.state = state.isRecording ? 'active' : '';
        updateStatus(state.isRecording ? 'режим записи включен' : 'режим записи выключен');
      }

      function toggleCell(trackId, step) {
        state.sequence[trackId][step] = !state.sequence[trackId][step];
        if (state.sequence[trackId][step]) {
          state.pitchMap[trackId][step] = state.pitchMap[trackId][step] ?? tracks.find((t) => t.id === trackId).freq;
        } else {
          state.pitchMap[trackId][step] = null;
        }
        renderGrid();
      }

      function saveTrack() {
        const payload = {
          name: els.trackName.value.trim() || 'Без названия',
          tempo: state.tempo,
          steps: state.steps,
          sequence: state.sequence,
          pitchMap: state.pitchMap,
          updatedAt: new Date().toISOString(),
        };
        localStorage.setItem('arm-kassira-track', JSON.stringify(payload));
        updateStatus(`проект сохранен: ${payload.name}`);
      }

      function loadTrack() {
        const raw = localStorage.getItem('arm-kassira-track');
        if (!raw) {
          updateStatus('не найден сохраненный проект');
          return;
        }

        try {
          const payload = JSON.parse(raw);
          const incomingSteps = Math.min(192, Math.max(16, Number(payload.steps) || 32));
          resetSequence(incomingSteps);
          els.stepsCount.value = String(incomingSteps);

          if (payload.sequence) {
            tracks.forEach((track) => {
              const incoming = payload.sequence[track.id] || [];
              state.sequence[track.id] = Array.from({ length: state.steps }, (_, i) => Boolean(incoming[i]));
            });
          }
          if (payload.pitchMap) {
            tracks.forEach((track) => {
              const incomingPitch = payload.pitchMap[track.id] || [];
              state.pitchMap[track.id] = Array.from({ length: state.steps }, (_, i) => Number(incomingPitch[i]) || null);
            });
          } else {
            tracks.forEach((track) => {
              state.pitchMap[track.id] = Array.from({ length: state.steps }, (_, i) =>
                state.sequence[track.id][i] ? track.freq : null
              );
            });
          }
          if (payload.tempo) {
            state.tempo = Math.min(160, Math.max(80, Number(payload.tempo) || 110));
            els.tempo.value = state.tempo;
            updateTempoDisplay();
            if (state.isPlaying) {
              clearInterval(state.timerId);
              state.timerId = setInterval(tick, stepDurationMs());
            }
          }
          if (payload.name) {
            els.trackName.value = payload.name;
          }

          buildGrid();
          renderGrid();
          updateStatus(`проект загружен: ${payload.name || 'трек'}`);
        } catch {
          updateStatus('ошибка чтения сохранения');
        }
      }

      function audioBufferToWavBlob(audioBuffer) {
        const numChannels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const bitDepth = 16;
        const blockAlign = (numChannels * bitDepth) / 8;
        const byteRate = sampleRate * blockAlign;
        const dataSize = audioBuffer.length * blockAlign;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        function writeString(offset, str) {
          for (let i = 0; i < str.length; i += 1) {
            view.setUint8(offset + i, str.charCodeAt(i));
          }
        }

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, dataSize, true);

        const channels = Array.from({ length: numChannels }, (_, ch) => audioBuffer.getChannelData(ch));
        let offset = 44;

        for (let i = 0; i < audioBuffer.length; i += 1) {
          for (let ch = 0; ch < numChannels; ch += 1) {
            const sample = Math.max(-1, Math.min(1, channels[ch][i]));
            view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
            offset += 2;
          }
        }

        return new Blob([buffer], { type: 'audio/wav' });
      }

      function applyPreset(presetName) {
        const preset = presets[presetName];
        if (!preset) return;

        resetSequence(preset.steps);
        buildGrid();

        state.tempo = Math.min(160, Math.max(80, Number(preset.tempo) || 110));
        els.tempo.value = String(state.tempo);
        els.stepsCount.value = String(preset.steps);
        updateTempoDisplay();

        tracks.forEach((track) => {
          state.sequence[track.id] = Array(state.steps).fill(false);
          state.pitchMap[track.id] = Array(state.steps).fill(null);

          const steps = preset.sequence[track.id] || [];
          steps.forEach((step) => {
            if (step >= 0 && step < state.steps) {
              state.sequence[track.id][step] = true;
              state.pitchMap[track.id][step] = track.freq;
            }
          });
        });

        const melody = preset.melody || {};
        Object.entries(melody).forEach(([trackId, notes]) => {
          if (!state.sequence[trackId]) return;
          notes.forEach(({ step, midi }) => {
            if (step >= 0 && step < state.steps) {
              state.sequence[trackId][step] = true;
              state.pitchMap[trackId][step] = midiToFreq(midi);
            }
          });
        });

        if (state.isPlaying) {
          clearInterval(state.timerId);
          state.timerId = setInterval(tick, stepDurationMs());
        }

        renderGrid();
        updateStatus(`загружен пресет: ${preset.label}`);
      }

      function downloadBlob(blob, filename) {
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1500);

        if (window.navigator?.msSaveOrOpenBlob) {
          window.navigator.msSaveOrOpenBlob(blob, filename);
        }
      }

      function createOfflineContext(channels, frameCount, sampleRate) {
        const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
        if (!OfflineCtx) {
          throw new Error('OfflineAudioContext is not supported in this browser.');
        }
        return new OfflineCtx(channels, frameCount, sampleRate);
      }

      async function exportTrackWav() {
        updateStatus('идет рендер WAV (3 мин), подождите...');

        const stepDuration = stepDurationMs() / 1000;
        const loopDuration = state.steps * stepDuration;
        const totalDuration = WAV_EXPORT_DURATION_SECONDS;
        const loopsToRender = Math.ceil(totalDuration / loopDuration);
        const tail = 0.5;
        const frameCount = Math.ceil((totalDuration + tail) * WAV_SAMPLE_RATE);
        const offlineCtx = createOfflineContext(2, frameCount, WAV_SAMPLE_RATE);

        for (let loopIndex = 0; loopIndex < loopsToRender; loopIndex += 1) {
          const loopOffset = loopIndex * loopDuration;
          tracks.forEach((track) => {
            state.sequence[track.id].forEach((isActive, step) => {
              if (!isActive) return;
              const start = loopOffset + step * stepDuration;
              if (start > totalDuration) return;
              if (start + NOTE_ATTACK >= totalDuration + tail) return;

              const osc = offlineCtx.createOscillator();
              const gain = offlineCtx.createGain();
              osc.type = track.type;
              osc.frequency.value = state.pitchMap[track.id][step] ?? track.freq;
              createNoteEnvelope(gain, start);
              osc.connect(gain);
              gain.connect(offlineCtx.destination);
              osc.start(start);
              osc.stop(start + NOTE_DECAY + 0.02);
            });
          });
        }

        const rendered = await offlineCtx.startRendering();
        const trimmedFrameCount = Math.floor(totalDuration * WAV_SAMPLE_RATE);
        const bufferFactoryCtx = createOfflineContext(2, 1, WAV_SAMPLE_RATE);
        const finalBuffer = bufferFactoryCtx.createBuffer(2, trimmedFrameCount, WAV_SAMPLE_RATE);
        for (let ch = 0; ch < 2; ch += 1) {
          finalBuffer.copyToChannel(rendered.getChannelData(ch).slice(0, trimmedFrameCount), ch);
        }
        const blob = audioBufferToWavBlob(finalBuffer);
        const fileNameBase = (els.trackName.value.trim() || 'track').replace(/\s+/g, '_').toLowerCase();
        const fileName = `${fileNameBase}.wav`;
        downloadBlob(blob, fileName);
        updateStatus(`аудио сохранено: ${fileName} (3 мин)`);
      }

      function exportTrackJson() {
        const payload = {
          name: els.trackName.value.trim() || 'Без названия',
          tempo: state.tempo,
          steps: state.steps,
          sequence: state.sequence,
          exportedAt: new Date().toISOString(),
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const fileName = `${payload.name.replace(/\s+/g, '_').toLowerCase() || 'track'}.json`;
        downloadBlob(blob, fileName);
        updateStatus(`экспортировано: ${fileName}`);
      }

      els.gridBody.addEventListener('click', (event) => {
        const cell = event.target.closest('.cell');
        if (!cell) return;
        toggleCell(cell.dataset.track, Number(cell.dataset.step));
      });

      els.tempo.addEventListener('input', () => {
        state.tempo = Number(els.tempo.value);
        updateTempoDisplay();
        if (state.isPlaying) {
          clearInterval(state.timerId);
          state.timerId = setInterval(tick, stepDurationMs());
        }
      });

      els.stepsCount.addEventListener('change', () => {
        const nextSteps = Number(els.stepsCount.value);
        resetSequence(nextSteps);
        buildGrid();
        renderGrid();
        updateStatus(`количество шагов: ${nextSteps}`);
      });

      els.playBtn.addEventListener('click', startPlayback);
      els.stopBtn.addEventListener('click', stopPlayback);
      els.recBtn.addEventListener('click', toggleRecording);
      els.saveAudio.addEventListener('click', () => {
        exportTrackWav().catch(() => updateStatus('ошибка экспорта WAV'));
      });
      els.saveProject.addEventListener('click', saveTrack);
      els.loadLocal.addEventListener('click', loadTrack);
      els.exportJson.addEventListener('click', exportTrackJson);
      els.presetYolochka.addEventListener('click', () => applyPreset('yolochka'));
      els.presetKatyusha.addEventListener('click', () => applyPreset('katyusha'));

      document.addEventListener('keydown', (event) => {
        if (!state.isRecording) return;
        const index = Number(event.key) - 1;
        if (Number.isNaN(index) || index < 0 || index >= tracks.length) return;
        const track = tracks[index];
        state.sequence[track.id][state.currentStep] = true;
        playNote(track);
        renderGrid();
      });

      resetSequence(32);
      updateTempoDisplay();
      buildGrid();
      renderGrid();
    </script>
  </body>
</html>
