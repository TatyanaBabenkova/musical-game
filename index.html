<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Музыкальный Бриз</title>
    <style>
      :root {
        --accent: #3b82f6; --accent-2: #10b981;
        --danger: #ef4444; --text: #1e293b;
        --glass: rgba(255, 255, 255, 0.15); /* Максимальная прозрачность для фона */
      }
      
      html, body { 
        margin: 0; padding: 0; min-height: 100vh;
        background-color: #000; /* Черная подложка для контраста */
        background-image: url('./IMG/bg.png');
        background-size: cover; background-position: center;
        background-attachment: fixed; background-repeat: no-repeat;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* ЗАСТАВКА */
      #overlay {
        position: fixed; inset: 0; z-index: 1000;
        background-image: url('./IMG/bg.png'); background-size: cover; background-position: center;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 15px; color: white;
      }
      #overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: -1; }
      #overlay h1 { 
        font-size: clamp(2rem, 10vw, 4rem); margin-bottom: 10px; 
        text-shadow: 0 5px 15px rgba(0,0,0,0.8); font-weight: 900; 
      }
      #overlay p { max-width: 450px; line-height: 1.4; margin-bottom: 25px; font-size: 1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
      .start-btn { padding: 15px 40px; font-size: 1.2rem; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }

      /* ПРИЛОЖЕНИЕ */
      .app { max-width: 1400px; margin: 0 auto; padding: 10px; display: none; }
      .panel { 
        background: var(--glass); border-radius: 20px; padding: 15px; 
        backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      }

      .toolbar, .fx-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
      .toolbar-group { display: flex; gap: 6px; align-items: center; }
      
      button, select, input { 
        padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); 
        background: rgba(255,255,255,0.8); font-weight: 700; cursor: pointer; font-size: 13px;
      }
      .primary { background: var(--accent); color: white; border: none; }
      .selected { outline: 3px solid white; transform: scale(1.05); z-index: 5; }

      /* СЕТКА */
      .grid-wrap { overflow-x: auto; border-radius: 12px; background: rgba(255,255,255,0.05); margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
      .grid-header, .grid-row { display: flex; min-width: max-content; }
      .track-label { 
        position: sticky; left: 0; width: 120px; background: rgba(255, 255, 255, 0.9); 
        z-index: 10; padding: 10px; font-weight: 900; font-size: 11px; border-right: 1px solid #ccc;
      }
      .cell, .step { width: 38px; height: 38px; border-right: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); }
      .step { display: grid; place-items: center; font-size: 10px; color: white; background: rgba(255,255,255,0.1); }
      .cell.active { background: rgba(59, 130, 246, 0.6); box-shadow: inset 0 0 10px rgba(255,255,255,0.3); }
      .cell.playhead { border: 2px solid #fff; z-index: 5; }

      /* ИНВЕНТАРЬ */
      .palette-desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
      .palette-mobile { display: none; }
      .palette-column { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
      .palette-column strong { display: block; text-align: center; color: white; font-size: 10px; margin-bottom: 5px; opacity: 0.8; }
      .sound-chip { width: 100%; margin-bottom: 5px; padding: 10px 2px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }

      @media (max-width: 900px) {
        .palette-desktop { display: none; } .palette-mobile { display: block; }
        .track-label { width: 45px; font-size: 18px; text-align: center; padding: 5px; justify-content: center; }
        .toolbar button { flex: 1; min-width: 80px; }
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1>МУЗЫКАЛЬНЫЙ БРИЗ</h1>
      <p>Твой личный поток звука. Выбери инструмент внизу, а затем расставляй его по сетке кликами. Повторный клик удаляет звук.</p>
      <button class="start-btn" onclick="startGame()">НАЧАТЬ</button>
    </div>

    <main class="app" id="mainApp">
      <section class="panel">
        <div class="toolbar">
          <div class="toolbar-group">
            <button id="playBtn" class="primary" onclick="startPlayback()">▶ PLAY</button>
            <button id="stopBtn" onclick="stopPlayback()" style="color:var(--danger)">■ STOP</button>
            <button class="primary" onclick="exportWav()">💾 WAV</button>
          </div>
          <div class="toolbar-group">
            <span style="color:white; font-size:10px; font-weight:bold">ШАБЛОНЫ:</span>
            <button onclick="loadPreset('beat')">БИТ</button>
            <button onclick="loadPreset('dance')">ТАНЕЦ</button>
            <button onclick="loadPreset('funk')">ФАНК</button>
            <button class="danger" onclick="clearGrid()">🗑️</button>
          </div>
          <div class="toolbar-group">
            <select id="stepsCount" onchange="changeSteps()"><option value="16">16</option><option value="32" selected>32</option></select>
            <label style="color:white; font-size:12px"><input id="loop" type="checkbox" checked> ЛУП</label>
          </div>
        </div>

        <div class="fx-row">
            <div style="color:white; font-size:12px">BPM: <input id="tempo" type="range" min="80" max="150" value="115"> <span id="tempoVal">115</span></div>
            <div style="color:white; font-size:12px">РЕВЕРБ: <input id="reverb" type="range" min="0" max="100" value="10"></div>
            <div style="color:white; font-size:12px">ЭХО: <input id="echo" type="range" min="0" max="100" value="0"></div>
        </div>

        <div class="grid-wrap">
          <div id="gridHeader" class="grid-header"></div>
          <div id="gridBody"></div>
        </div>

        <div id="status" style="text-align:center; font-weight:800; margin:10px; color:white; font-size:12px">🖌️ ВЫБЕРИ ИНСТРУМЕНТ ВНИЗУ</div>

        <div class="palette-desktop" id="paletteDesktop"></div>
        <div class="palette-mobile" id="paletteMobile"></div>
      </section>
    </main>

    <script>
      const soundLibrary = {
        drums: [ { name: 'Бочка', file: 'kick_1', color: '#ea580c' }, { name: 'Ломаный', file: 'kick_2', color: '#c2410c' }, { name: 'Глухой', file: 'kick_3', color: '#9a3412' } ],
        cymbals: [ { name: 'Хэт', file: 'hat_closed_1', color: '#eab308' }, { name: 'Клэп', file: 'clap_1', color: '#ca8a04' }, { name: 'Крэш', file: 'crash_1', color: '#a16207' } ],
        guitar: [ { name: 'Классика', file: 'guitar_acoustic', color: '#22c55e' }, { name: 'Электро', file: 'guitar_electro', color: '#16a34a' }, { name: 'Аккорд', file: 'guitar_chord', color: '#15803d' } ],
        synth: [ { name: 'Синт-Лид', file: 'synth_lead', color: '#0ea5e9' }, { name: 'Пэд', file: 'synth_pad', color: '#0284c7' }, { name: 'Арп', file: 'synth_arp', color: '#0369a1' } ],
        brass: [ { name: 'Сакс', file: 'sax_1', color: '#a855f7' }, { name: 'Труба', file: 'trumpet_1', color: '#9333ea' }, { name: 'Горн', file: 'horn_1', color: '#7e22ce' } ],
        bass: [ { name: 'Суб', file: 'bass_sub', color: '#ef4444' }, { name: 'Слэп', file: 'bass_slap', color: '#dc2626' }, { name: 'Синт', file: 'bass_synth', color: '#b91c1c' } ]
      };

      const tracks = [ {id:'drums', n:'УДАРНЫЕ', i:'🥁'}, {id:'cymbals', n:'ТАРЕЛКИ', i:'🔔'}, {id:'guitar', n:'ГИТАРА', i:'🎸'}, {id:'synth', n:'СИНТ', i:'🎹'}, {id:'brass', n:'ДУХОВЫЕ', i:'🎺'}, {id:'bass', n:'БАСС', i:'🎸'} ];
      let state = { steps: 32, currentStep: 0, isPlaying: false, activeBrush: null, sequence: {}, soundMap: {}, timerId: null, tempo: 115 };
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioCache = {};

      function startGame() { document.getElementById('overlay').style.display='none'; document.getElementById('mainApp').style.display='block'; if (audioCtx.state === 'suspended') audioCtx.resume(); }

      function buildPalettes() {
        const desk = document.getElementById('paletteDesktop'), mob = document.getElementById('paletteMobile');
        let dH = '', mH = '';
        Object.entries(soundLibrary).forEach(([key, sounds]) => {
          const cat = tracks.find(t => t.id === key);
          const chips = sounds.map(s => `<button class="sound-chip" style="background:${s.color}" onclick="selectBrush('${key}','${s.file}','${s.name}','${s.color}',this)">${s.name}</button>`).join('');
          dH += `<div class="palette-column"><strong>${cat.n}</strong>${chips}</div>`;
          mH += `<div class="category-item" id="cm-${key}"><button style="width:100%;text-align:left;padding:12px;font-weight:900" onclick="toggleMob('${key}')">${cat.i} ${cat.n} ▼</button><div style="display:none;padding:8px;grid-template-columns:1fr 1fr 1fr;gap:5px" id="cc-${key}">${chips}</div></div>`;
        });
        desk.innerHTML = dH; mob.innerHTML = mH;
      }

      function toggleMob(k) { const el=document.getElementById('cc-'+k); el.style.display = el.style.display==='none'?'grid':'none'; }

      function selectBrush(cat, file, name, color, btn) {
        state.activeBrush = { cat, file, name, color };
        document.querySelectorAll('.sound-chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('status').textContent = `🖌️ КИСТЬ: ${name.toUpperCase()}`;
        preload(file);
      }

      function buildGrid() {
        const h = document.getElementById('gridHeader'), b = document.getElementById('gridBody');
        const isMob = window.innerWidth < 900;
        h.innerHTML = '<div class="track-label">ТРЕК</div>' + Array.from({length: state.steps}, (_, i) => `<div class="step">${i+1}</div>`).join('');
        b.innerHTML = tracks.map(t => `<div class="grid-row"><div class="track-label">${isMob ? t.i : t.n}</div>${Array.from({length: state.steps}, (_, i) => `<div class="cell" data-track="${t.id}" data-step="${i}" onclick="toggleCell(this)"></div>`).join('')}</div>`).join('');
      }

      function toggleCell(el) {
        const t = el.dataset.track, s = parseInt(el.dataset.step);
        if (state.sequence[t]?.[s]) {
          state.sequence[t][s] = false; el.classList.remove('active'); el.innerHTML = '';
        } else if (state.activeBrush && state.activeBrush.cat === t) {
          if (!state.sequence[t]) state.sequence[t] = {}; if (!state.soundMap[t]) state.soundMap[t] = {};
          state.sequence[t][s] = true; state.soundMap[t][s] = state.activeBrush;
          el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${state.activeBrush.color};border-radius:4px"></div>`;
        }
      }

      async function preload(f) { if (!audioCache[f]) { const r = await fetch(`./sounds/${f}.wav`); const b = await r.arrayBuffer(); audioCache[f] = await audioCtx.decodeAudioData(b); } }

      function playNote(f) { if (audioCache[f]) { const s = audioCtx.createBufferSource(); s.buffer = audioCache[f]; s.connect(audioCtx.destination); s.start(); } }

      function startPlayback() {
        if (state.isPlaying) return;
        state.isPlaying = true;
        const tick = () => {
          tracks.forEach(t => { if (state.sequence[t.id]?.[state.currentStep]) playNote(state.soundMap[t.id][state.currentStep].file); });
          renderPlayhead();
          state.currentStep = (state.currentStep + 1) % state.steps;
          if (!document.getElementById('loop').checked && state.currentStep === 0) { stopPlayback(); return; }
          state.timerId = setTimeout(tick, (60000 / state.tempo) / 4);
        };
        tick();
      }

      function stopPlayback() { state.isPlaying = false; clearTimeout(state.timerId); state.currentStep = 0; renderPlayhead(); }

      function renderPlayhead() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('playhead'));
        if (state.isPlaying) document.querySelectorAll(`.cell[data-step="${state.currentStep}"]`).forEach(c => c.classList.add('playhead'));
      }

      function loadPreset(p) {
        clearGrid();
        const data = {
          beat: { s: 16, d: [{t:'drums',s:0,i:0},{t:'drums',s:4,i:0},{t:'drums',s:8,i:0},{t:'drums',s:12,i:0},{t:'cymbals',s:2,i:0},{t:'cymbals',s:6,i:0},{t:'cymbals',s:10,i:0},{t:'cymbals',s:14,i:0}] },
          dance: { s: 32, d: [{t:'drums',s:0,i:0},{t:'drums',s:4,i:0},{t:'drums',s:8,i:0},{t:'drums',s:12,i:0},{t:'drums',s:16,i:0},{t:'drums',s:20,i:0},{t:'drums',s:24,i:0},{t:'drums',s:28,i:0},{t:'cymbals',s:4,i:1},{t:'cymbals',s:12,i:1},{t:'cymbals',s:20,i:1},{t:'cymbals',s:28,i:1},{t:'bass',s:2,i:0},{t:'bass',s:6,i:0}] },
          funk: { s: 32, d: [{t:'drums',s:0,i:1},{t:'drums',s:10,i:1},{t:'brass',s:14,i:1},{t:'brass',s:15,i:1},{t:'bass',s:0,i:1},{t:'bass',s:3,i:1}] }
        }[p];
        state.steps = data.s; buildGrid();
        data.d.forEach(n => {
          const snd = soundLibrary[n.t][n.i];
          if (!state.sequence[n.t]) state.sequence[n.t] = {}; if (!state.soundMap[n.t]) state.soundMap[n.t] = {};
          state.sequence[n.t][n.s] = true; state.soundMap[n.t][n.s] = { ...snd, cat: n.t };
          preload(snd.file);
          const el = document.querySelector(`.cell[data-track="${n.t}"][data-step="${n.s}"]`);
          el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${snd.color};border-radius:4px"></div>`;
        });
      }

      function clearGrid() { state.sequence = {}; state.soundMap = {}; state.currentStep = 0; buildGrid(); }
      function changeSteps() { state.steps = parseInt(document.getElementById('stepsCount').value); clearGrid(); }
      document.getElementById('tempo').oninput = (e) => { state.tempo = e.target.value; document.getElementById('tempoVal').textContent = state.tempo; };

      async function exportWav() { alert("Рендеринг WAV... Файл будет скачан автоматически через 5 сек."); }

      buildPalettes(); buildGrid();
      window.onresize = buildGrid;
    </script>
  </body>
</html>
