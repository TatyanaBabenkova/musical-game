<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный редактор</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; user-select: none; }
        .app-container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Верхняя панель */
        .top-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ccc; }
        .controls label { margin-right: 15px; font-size: 14px; }
        .tempo-control { display: flex; align-items: center; gap: 10px; }
        .playback-controls button { font-size: 18px; padding: 5px 15px; cursor: pointer; border: 1px solid #ccc; background: #eee; border-radius: 5px; }
        .playback-controls button.active { background: #ffcccc; border-color: red; }

        /* Сетка секвенсора */
        .grid { display: grid; grid-template-columns: 120px repeat(8, 1fr); gap: 2px; background: #ccc; border: 1px solid #999; }
        .grid-header { background: #e0e0e0; padding: 10px; text-align: center; font-weight: bold; border-bottom: 2px solid #999; }
        .track-name { background: #f9f9f9; padding: 10px; font-weight: bold; display: flex; align-items: center; border-right: 2px solid #999; }
        .cell { background: white; height: 50px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cell.playing { background: #e6f7ff; }
        .cell:hover { background: #f0f0f0; }

        /* Блоки звуков на сетке */
        .sound-block { background: #ffccff; border: 1px solid #ff00ff; border-radius: 3px; padding: 5px; font-size: 12px; cursor: grab; text-align: center; width: 80%; }
        
        /* Нижняя панель (Инвентарь) */
        .inventory { margin-top: 30px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; border-top: 2px solid #ccc; padding-top: 20px; }
        .inventory-category { border: 1px dashed #999; padding: 10px; min-height: 80px; }
        .inventory-category h4 { margin: 0 0 10px 0; font-size: 14px; text-align: center; }
        .inventory-items { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .inventory-item { background: #e0e0e0; border: 1px solid #999; padding: 5px 10px; border-radius: 15px; font-size: 12px; cursor: grab; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-panel">
        <div class="controls">
            <label><input type="checkbox"> Вебр</label>
            <label><input type="checkbox"> Реверб</label>
            <label><input type="checkbox"> Эхо</label>
            <label><input type="checkbox"> Луп</label>
        </div>
        <div class="tempo-control">
            <label for="tempo">Темп (BPM):</label>
            <input type="range" id="tempo" min="80" max="160" value="120" oninput="document.getElementById('tempo-val').innerText = this.value">
            <span id="tempo-val">120</span>
        </div>
        <div class="playback-controls">
            <button id="playBtn">▶ Play</button>
            <button id="recBtn">⏺ Rec</button>
        </div>
    </div>

    <div class="grid" id="sequencerGrid">
        <div class="grid-header">Инструмент</div>
        <div class="grid-header">1</div><div class="grid-header">2</div><div class="grid-header">3</div><div class="grid-header">4</div>
        <div class="grid-header">1</div><div class="grid-header">2</div><div class="grid-header">3</div><div class="grid-header">4</div>

        </div>

    <div class="inventory">
        <div class="inventory-category">
            <h4>Барабаны</h4>
            <div class="inventory-items">
                <div class="inventory-item" draggable="true" data-type="kick" data-file="bochka">Бочка</div>
                <div class="inventory-item" draggable="true" data-type="kick" data-file="bit">Бит</div>
            </div>
        </div>
        <div class="inventory-category">
            <h4>Тарелки</h4>
            <div class="inventory-items">
                <div class="inventory-item" draggable="true" data-type="hat" data-file="clap">Клэп</div>
            </div>
        </div>
        <div class="inventory-category">
            <h4>Гитара</h4>
            <div class="inventory-items">
                <div class="inventory-item" draggable="true" data-type="guitar" data-file="electro">Электро</div>
                <div class="inventory-item" draggable="true" data-type="guitar" data-file="struna">Струна</div>
            </div>
        </div>
        <div class="inventory-category">
            <h4>Синтезатор</h4>
            <div class="inventory-items">
                <div class="inventory-item" draggable="true" data-type="synth" data-file="synth1">Синт</div>
            </div>
        </div>
        <div class="inventory-category">
            <h4>Духовые / Басс</h4>
            <div class="inventory-items">
                <div class="inventory-item" draggable="true" data-type="brass" data-file="sax">Саксофон</div>
                <div class="inventory-item" draggable="true" data-type="bass" data-file="bass1">Басс</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Настройка сетки ---
    const tracks = ['Ударные', 'Тарелки', 'Гитара', 'Синтезатор', 'Духовые', 'Басс'];
    const grid = document.getElementById('sequencerGrid');
    const cols = 8; // 8 шагов (2 такта по 4)

    tracks.forEach(track => {
        const rowHeader = document.createElement('div');
        rowHeader.className = 'track-name';
        rowHeader.innerText = track;
        grid.appendChild(rowHeader);

        for (let i = 0; i < cols; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.track = track;
            cell.dataset.step = i;
            
            // Настройка приема перетаскиваемых элементов
            cell.addEventListener('dragover', e => e.preventDefault());
            cell.addEventListener('drop', handleDrop);
            grid.appendChild(cell);
        }
    });

    // --- Drag and Drop логика ---
    let draggedData = null;

    document.querySelectorAll('.inventory-item').forEach(item => {
        item.addEventListener('dragstart', (e) => {
            draggedData = {
                name: e.target.innerText,
                type: e.target.dataset.type,
                file: e.target.dataset.file
            };
        });
    });

    function handleDrop(e) {
        e.preventDefault();
        const cell = e.target.closest('.cell');
        if (!cell || !draggedData) return;

        // Очищаем ячейку перед добавлением нового звука
        cell.innerHTML = ''; 
        
        const soundBlock = document.createElement('div');
        soundBlock.className = 'sound-block';
        soundBlock.innerText = draggedData.name;
        soundBlock.dataset.type = draggedData.type;
        soundBlock.dataset.file = draggedData.file;
        
        // Удаление по двойному клику
        soundBlock.addEventListener('dblclick', () => cell.innerHTML = '');
        
        cell.appendChild(soundBlock);
        draggedData = null;
    }

    // --- Аудио Движок (Фоллбэк + Синтезатор) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    async function playSound(type, filename) {
        // Попытка 1: Ищем реальный файл в папке sounds (например, sounds/bochka.wav)
        try {
            const response = await fetch(`./sounds/${filename}.wav`);
            if (response.ok) {
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start();
                return; // Успешно сыграли файл, выходим
            }
        } catch (e) {
            // Ошибка fetch (файла нет или локальный сервер блокирует) - идем к синтезатору
        }

        // Попытка 2: Синтезируем звук, если файла нет
        synthesizeFallback(type);
    }

    // Встроенный синтезатор (замена файлам)
    function synthesizeFallback(type) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'kick') {
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
            gainNode.gain.setValueAtTime(1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'hat') {
            // Имитация тарелки через высокочастотный осциллятор
            osc.type = 'square';
            osc.frequency.setValueAtTime(8000, now);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'guitar') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(330, now); // Нота Ми
            gainNode.gain.setValueAtTime(0.8, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1);
            osc.start(now);
            osc.stop(now + 1);
        } else if (type === 'synth') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, now);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'bass') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(55, now);
            gainNode.gain.setValueAtTime(1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else {
            // Духовые / По умолчанию
            osc.type = 'square';
            osc.frequency.setValueAtTime(220, now);
            gainNode.gain.setValueAtTime(0.4, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }

    // --- Логика воспроизведения (Play/Stop) ---
    let isPlaying = false;
    let currentStep = 0;
    let playInterval;

    const playBtn = document.getElementById('playBtn');
    
    playBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume(); // Важно для браузеров
        
        isPlaying = !isPlaying;
        if (isPlaying) {
            playBtn.innerText = '⏸ Stop';
            playBtn.classList.add('active');
            startLoop();
        } else {
            playBtn.innerText = '▶ Play';
            playBtn.classList.remove('active');
            clearInterval(playInterval);
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('playing'));
        }
    });

    function startLoop() {
        const bpm = document.getElementById('tempo').value;
        const stepTimeMs = (60 / bpm) * 1000 / 2; // Восьмые ноты

        playInterval = setInterval(() => {
            // Очищаем подсветку
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('playing'));
            
            // Подсвечиваем текущий шаг
            const currentCells = document.querySelectorAll(`.cell[data-step="${currentStep}"]`);
            currentCells.forEach(cell => {
                cell.classList.add('playing');
                
                // Если в ячейке есть блок со звуком, играем его
                const soundBlock = cell.querySelector('.sound-block');
                if (soundBlock) {
                    playSound(soundBlock.dataset.type, soundBlock.dataset.file);
                }
            });

            currentStep = (currentStep + 1) % cols; // Движение по кругу
        }, stepTimeMs);
    }
</script>

</body>
</html>
