<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Музыкальная игра Попутчик</title>
    <style>
      :root {
        --panel: rgba(255, 255, 255, 0.75);
        --accent: #3b82f6; --accent-2: #10b981;
        --danger: #ef4444; --text: #1e293b;
      }
      
      /* ФОН НА ВСЕ СЛОИ */
      html, body { 
        margin: 0; padding: 0; min-height: 100vh;
        background-color: #f0f4f8;
        background-image: url('./IMG/bg.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* ЗАСТАВКА */
      #overlay {
        position: fixed; inset: 0; z-index: 1000;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(10px);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px;
      }
      #overlay h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }
      #overlay p { max-width: 400px; line-height: 1.6; margin-bottom: 25px; color: var(--text); }
      .start-btn { 
        padding: 15px 40px; font-size: 1.2rem; background: var(--accent); 
        color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
      }

      .app { max-width: 1200px; margin: 0 auto; padding: 10px; display: none; }
      .panel { 
        background: var(--panel); border-radius: 16px; padding: 15px; 
        backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
      }

      /* УПРАВЛЕНИЕ */
      .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
      .controls-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
      
      button, select { 
        padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; 
        background: white; font-weight: 600; cursor: pointer; font-size: 13px;
      }
      .primary { background: var(--accent); color: white; border: none; }

      /* СЕТКА С СКРОЛЛОМ */
      .grid-wrap { 
        overflow-x: auto; border-radius: 12px; background: rgba(255,255,255,0.5);
        margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1);
      }
      .grid-header, .grid-row { display: flex; min-width: max-content; }
      .track-label { 
        position: sticky; left: 0; width: 100px; background: #f8fafc; 
        z-index: 10; padding: 10px; font-weight: bold; font-size: 12px; border-right: 1px solid #ddd;
      }
      .cell, .step { width: 35px; height: 35px; border-right: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); }
      .step { display: grid; place-items: center; font-size: 10px; color: #94a3b8; }
      .cell.active { background: rgba(59, 130, 246, 0.3); }
      .cell.playhead { outline: 2px solid var(--accent); z-index: 5; }

      /* КОМПАКТНЫЙ ИНВЕНТАРЬ */
      .category-item { margin-bottom: 5px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
      .category-trigger { 
        width: 100%; padding: 10px; text-align: left; background: white; 
        border: none; font-weight: bold; display: flex; justify-content: space-between;
      }
      .category-content { display: none; padding: 10px; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: rgba(255,255,255,0.3); }
      .category-item.open .category-content { display: grid; }
      
      .sound-chip { 
        padding: 10px 5px; border: none; border-radius: 6px; color: white; 
        font-size: 11px; font-weight: bold; text-align: center;
      }
      .sound-chip.selected { ring: 3px solid black; transform: scale(0.95); outline: 2px solid #000; }

      @media (max-width: 600px) {
        .toolbar button { flex: 1; padding: 12px 5px; }
        .track-label { width: 80px; font-size: 10px; }
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1>ПОПУТЧИК</h1>
      <p>Создавай свою музыку в одно касание!<br><br>
      <b>Как играть:</b> Выбери инструмент внизу (он подсветится), а затем нажимай на клетки в таблице, чтобы расставить звуки.</p>
      <button class="start-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

    <main class="app" id="mainApp">
      <section class="panel">
        <div class="toolbar">
          <button id="playBtn" class="primary">▶ PLAY</button>
          <button id="stopBtn" style="color:var(--danger)">■ STOP</button>
          <button onclick="loadPreset('dance')">ТАНЕЦ</button>
          <button onclick="loadPreset('funk')">ФАНК</button>
          <button class="danger" onclick="clearGrid()">ОЧИСТИТЬ</button>
        </div>

        <div class="controls-row">
          <div style="font-size:12px">BPM: <input id="tempo" type="range" min="80" max="150" value="110"></div>
          <div><select id="stepsCount"><option value="16">16 шагов</option><option value="32" selected>32 шага</option></select></div>
        </div>

        <div class="grid-wrap">
          <div id="gridHeader" class="grid-header"></div>
          <div id="gridBody"></div>
        </div>

        <div id="status" style="font-size:11px; margin-bottom:10px; color:var(--accent)">Выбери инструмент ниже...</div>

        <div id="palette">
          </div>
      </section>
    </main>

    <script>
      const soundLibrary = {
        drums: [ { name: 'Бочка', file: 'kick_1', color: '#ea580c' }, { name: 'Ломаный', file: 'kick_2', color: '#c2410c' }, { name: 'Глухой', file: 'kick_3', color: '#9a3412' } ],
        cymbals: [ { name: 'Хэт', file: 'hat_closed_1', color: '#eab308' }, { name: 'Клэп', file: 'clap_1', color: '#ca8a04' }, { name: 'Крэш', file: 'crash_1', color: '#a16207' } ],
        guitar: [ { name: 'Классика', file: 'guitar_acoustic', color: '#22c55e' }, { name: 'Электро', file: 'guitar_electro', color: '#16a34a' }, { name: 'Аккорд', file: 'guitar_chord', color: '#15803d' } ],
        synth: [ { name: 'Синт-Лид', file: 'synth_lead', color: '#0ea5e9' }, { name: 'Пэд', file: 'synth_pad', color: '#0284c7' }, { name: 'Арп', file: 'synth_arp', color: '#0369a1' } ],
        brass: [ { name: 'Сакс', file: 'sax_1', color: '#a855f7' }, { name: 'Труба', file: 'trumpet_1', color: '#9333ea' }, { name: 'Горн', file: 'horn_1', color: '#7e22ce' } ],
        bass: [ { name: 'Суб', file: 'bass_sub', color: '#ef4444' }, { name: 'Слэп', file: 'bass_slap', color: '#dc2626' }, { name: 'Синт', file: 'bass_synth', color: '#b91c1c' } ]
      };

      const tracks = [ {id:'drums', name:'УДАРНЫЕ'}, {id:'cymbals', name:'ТАРЕЛКИ'}, {id:'guitar', name:'ГИТАРА'}, {id:'synth', name:'СИНТ'}, {id:'brass', name:'ДУХОВЫЕ'}, {id:'bass', name:'БАСС'} ];

      let state = { steps: 32, currentStep: 0, isPlaying: false, activeBrush: null, sequence: {}, soundMap: {} };
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioCache = {};

      function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function buildPalette() {
        const palette = document.getElementById('palette');
        const names = { drums: '🥁 УДАРНЫЕ', cymbals: '🔔 ТАРЕЛКИ', guitar: '🎸 ГИТАРА', synth: '🎹 СИНТЕЗАТОР', brass: '🎺 ДУХОВЫЕ', bass: '🎸 БАСС' };
        
        palette.innerHTML = Object.entries(soundLibrary).map(([key, sounds]) => `
          <div class="category-item" id="cat-${key}">
            <button class="category-trigger" onclick="toggleCategory('${key}')">${names[key]} <span>▼</span></button>
            <div class="category-content">
              ${sounds.map(s => `<button class="sound-chip" style="background:${s.color}" onclick="selectBrush('${key}', '${s.file}', '${s.name}', '${s.color}', this)">${s.name}</button>`).join('')}
            </div>
          </div>
        `).join('');
      }

      function toggleCategory(key) {
        const el = document.getElementById(`cat-${key}`);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.category-item').forEach(c => c.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
      }

      function selectBrush(cat, file, name, color, btn) {
        state.activeBrush = { cat, file, name, color };
        document.querySelectorAll('.sound-chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('status').textContent = `Кисть: ${name} (Ткни в сетку)`;
        preload(file);
      }

      function buildGrid() {
        const header = document.getElementById('gridHeader');
        const body = document.getElementById('gridBody');
        header.innerHTML = '<div class="track-label"></div>' + Array.from({length: state.steps}, (_, i) => `<div class="step">${i+1}</div>`).join('');
        body.innerHTML = tracks.map(t => `
          <div class="grid-row">
            <div class="track-label">${t.name}</div>
            ${Array.from({length: state.steps}, (_, i) => `<div class="cell" data-track="${t.id}" data-step="${i}" onclick="toggleCell(this)"></div>`).join('')}
          </div>
        `).join('');
      }

      function toggleCell(el) {
        const t = el.dataset.track; const s = parseInt(el.dataset.step);
        if (state.sequence[t]?.[s]) {
          state.sequence[t][s] = false; el.classList.remove('active'); el.innerHTML = '';
        } else if (state.activeBrush && state.activeBrush.cat === t) {
          if (!state.sequence[t]) state.sequence[t] = {}; if (!state.soundMap[t]) state.soundMap[t] = {};
          state.sequence[t][s] = true; state.soundMap[t][s] = state.activeBrush;
          el.classList.add('active'); el.innerHTML = `<div style="width:100%; height:100%; background:${state.activeBrush.color}; border-radius:4px"></div>`;
        }
      }

      async function preload(f) {
        if (audioCache[f]) return;
        const res = await fetch(`./sounds/${f}.wav`);
        const buf = await res.arrayBuffer();
        audioCache[f] = await audioCtx.decodeAudioData(buf);
      }

      // ... (Здесь остается ваша стандартная логика Play/Stop и шаблоны) ...

      buildPalette(); buildGrid();
    </script>
  </body>
</html>
