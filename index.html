<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Музыкальный Бриз</title>
    <style>
      :root {
        --accent: #3b82f6; --accent-2: #10b981; --danger: #ef4444;
        --glass: rgba(255, 255, 255, 0.1); /* Ультра-прозрачность для подложки */
        --border: rgba(0, 0, 0, 0.12); /* Линии сетки */
      }
      
      html, body { 
        margin: 0; padding: 0; min-height: 100vh; background-color: #000;
        background-image: url('./IMG/bg.png');
        background-size: cover; background-position: center;
        background-attachment: fixed; background-repeat: no-repeat;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      /* ЗАСТАВКА */
      #overlay {
        position: fixed; inset: 0; z-index: 2000;
        background-image: url('./IMG/bg.png'); background-size: cover; background-position: center;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px; color: white;
      }
      #overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: -1; }
      #overlay h1 { 
        font-size: clamp(2rem, 10vw, 4rem); margin-bottom: 10px; 
        text-shadow: 0 5px 20px rgba(0,0,0,0.8); font-weight: 900; 
        /* Исправление наложения букв */
        letter-spacing: -2px; line-height: 1;
      }
      #overlay p { max-width: 500px; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
      .start-btn { padding: 18px 50px; font-size: 1.3rem; background: var(--accent); color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

      /* ПРИЛОЖЕНИЕ */
      .app { max-width: 1400px; margin: 0 auto; padding: 10px; display: none; }
      .panel { 
        background: var(--glass); border-radius: 24px; padding: 20px; 
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 50px rgba(0,0,0,0.25);
      }

      /* ЗОНИРОВАНИЕ UI */
      .ui-zone { background: rgba(255,255,255,0.7); padding: 10px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px; }
      .ui-label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;}

      .toolbar, .fx-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;}
      .toolbar-group { display: flex; gap: 6px; align-items: center; }
      
      button, select, input { 
        padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); 
        background: white; font-weight: 800; cursor: pointer; font-size: 13px; transition: 0.2s;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
      .primary { background: var(--accent); color: white; border: none; }
      .danger { color: var(--danger); border-color: var(--danger); }
      .selected { outline: 3px solid #000; transform: scale(1.05); z-index: 5; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

      /* СЕТКА (ТАБЛИЦА) */
      .grid-wrap { overflow-x: auto; border-radius: 16px; background: rgba(255,255,255,0.03); margin-bottom: 15px; border: 1px solid var(--border); }
      .grid-header, .grid-row { display: flex; min-width: max-content; }
      .track-label { 
        position: sticky; left: 0; width: 120px; background: rgba(255, 255, 255, 0.9); 
        z-index: 10; padding: 10px; font-weight: 900; font-size: 11px; border-right: 2px solid var(--border);
      }
      .cell, .step { width: 40px; height: 40px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
      .step { display: grid; place-items: center; font-size: 10px; color: rgba(255,255,255,0.7); font-weight: bold; background: rgba(255,255,255,0.05); }
      .cell.active { background: rgba(59, 130, 246, 0.7); box-shadow: inset 0 0 10px rgba(255,255,255,0.4); }
      .cell.playhead { outline: 3px solid #fff; z-index: 5; background: rgba(255,255,255,0.2); }

      /* ИНВЕНТАРЬ */
      .palette-desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
      .palette-mobile { display: none; }
      .palette-column { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
      .palette-column strong { display: block; text-align: center; color: white; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
      .sound-chip { width: 100%; margin-bottom: 6px; padding: 12px 2px; border: none; border-radius: 8px; color: white; font-weight: 900; cursor: pointer; font-size: 11px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

      @media (max-width: 900px) {
        .palette-desktop { display: none; } .palette-mobile { display: block; }
        .track-label { width: 50px; font-size: 20px; text-align: center; padding: 5px; justify-content: center; }
        .toolbar, .fx-row { display: flex; gap: 8px; margin: 0; }
        .toolbar button { flex: 1; padding: 12px 2px; font-size: 11px; }
        
        /* Убираем слово "Управление" для компактности */
        #managementLabel { display: none; }
        
        /* Уменьшаем ячейки сетки, чтобы влезало больше */
        .cell, .step { width: 35px; height: 35px; }
        
        /* Уменьшаем текст инструкции */
        #statusHint { font-size: 11px; padding: 5px; margin: 5px;}
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1>МУЗЫКАЛЬНЫЙ БРИЗ</h1>
      <p>Создавай свою музыку в одно касание!<br><br>
      <b>Инструкция:</b> Выбери инструмент внизу (он подсветится), а затем нажимай на клетки в таблице, чтобы расставить звуки.</p>
      <button class="start-btn" onclick="startGame()">НАЧАТЬ</button>
    </div>

    <main class="app" id="mainApp">
      <section class="panel">
        
        <div class="ui-zone" style="background: rgba(255,255,255,0.6);">
            <div class="toolbar" style="justify-content:center; border-bottom:1px solid #ddd; padding-bottom:10px; margin-bottom:10px">
                <span id="managementLabel" class="ui-label">УПРАВЛЕНИЕ</span>
                <div class="toolbar-group" style="width:100%">
                    <button id="playBtn" class="primary" onclick="startPlayback()">▶ PLAY</button>
                    <button id="stopBtn" onclick="stopPlayback()" style="color:var(--danger)">■ STOP</button>
                    <button onclick="exportWav()">WAV</button>
                    <button class="danger" onclick="clearGrid()">🗑️ ОЧИСТИТЬ</button>
                </div>
            </div>
            
            <div class="fx-row" style="justify-content:center">
                <div class="toolbar-group">
                    <select id="stepsCount" onchange="changeSteps()"><option value="16">16 шаг.</option><option value="32" selected>32 шаг.</option></select>
                    <label style="color:#1e293b; font-size:12px; font-weight:bold"><input id="loop" type="checkbox" checked> ЛУП</label>
                </div>
                <div class="toolbar-group">
                    <div style="color:#1e293b; font-size:12px; font-weight:bold">BPM: <input id="tempo" type="range" min="80" max="150" value="115" oninput="updateTempo(this.value)"> <span id="tempoVal">115</span></div>
                </div>
            </div>
        </div>

        <div class="grid-wrap">
          <div id="gridHeader" class="grid-header"></div>
          <div id="gridBody"></div>
        </div>

        <div id="status" class="hint" style="text-align:center; font-weight:800; margin:10px; color:white; font-size:12px; letter-spacing:0.5px; clear:both;">🖌️ ВЫБЕРИ ИНСТРУМЕНТ ВНИЗУ И РИСУЙ НА СЕТКЕ</div>

        <div class="palette-desktop" id="paletteDesktop"></div>
        <div class="palette-mobile" id="paletteMobile"></div>
        
        <div class="ui-zone" style="background: rgba(255,255,255,0.6); margin-top:15px; text-align:center">
            <label class="ui-label">Готовые шаблоны битов</label>
            <div class="toolbar" style="justify-content:center; gap:10px">
                <button onclick="loadPreset('beat')">ПРОСТОЙ БИТ</button>
                <button onclick="loadPreset('dance')">ТАНЕЦ</button>
                <button onclick="loadPreset('funk')">ФАНК</button>
            </div>
        </div>

      </section>
    </main>

    <script>
      const soundLibrary = {
        drums: [ { name: 'Бочка', file: 'kick_1', color: '#ea580c' }, { name: 'Ломаный', file: 'kick_2', color: '#c2410c' }, { name: 'Глухой', file: 'kick_3', color: '#9a3412' } ],
        cymbals: [ { name: 'Хэт', file: 'hat_closed_1', color: '#eab308' }, { name: 'Клэп', file: 'clap_1', color: '#ca8a04' }, { name: 'Крэш', file: 'crash_1', color: '#a16207' } ],
        guitar: [ { name: 'Классика', file: 'guitar_acoustic', color: '#22c55e' }, { name: 'Электро', file: 'guitar_electro', color: '#16a34a' }, { name: 'Аккорд', file: 'guitar_chord', color: '#15803d' } ],
        synth: [ { name: 'Синт-Лид', file: 'synth_lead', color: '#0ea5e9' }, { name: 'Пэд', file: 'synth_pad', color: '#0284c7' }, { name: 'Арп', file: 'synth_arp', color: '#0369a1' } ],
        brass: [ { name: 'Сакс', file: 'sax_1', color: '#a855f7' }, { name: 'Труба', file: 'trumpet_1', color: '#9333ea' }, { name: 'Горн', file: 'horn_1', color: '#7e22ce' } ],
        bass: [ { name: 'Суб', file: 'bass_sub', color: '#ef4444' }, { name: 'Слэп', file: 'bass_slap', color: '#dc2626' }, { name: 'Синт', file: 'bass_synth', color: '#b91c1c' } ]
      };

      const tracks = [ {id:'drums', n:'УДАРНЫЕ', i:'🥁'}, {id:'cymbals', n:'ТАРЕЛКИ', i:'🔔'}, {id:'guitar', n:'ГИТАРА', i:'🎸'}, {id:'synth', n:'СИНТ', i:'🎹'}, {id:'brass', n:'ДУХОВЫЕ', i:'🎺'}, {id:'bass', n:'БАСС', i:'🎸'} ];
      let state = { steps: 32, currentStep: 0, isPlaying: false, activeBrush: null, sequence: {}, soundMap: {}, timerId: null, tempo: 115 };
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioCache = {};

      function startGame() { document.getElementById('overlay').style.display='none'; document.getElementById('mainApp').style.display='block'; if (audioCtx.state === 'suspended') audioCtx.resume(); }

      function buildPalettes() {
        const desk = document.getElementById('paletteDesktop'), mob = document.getElementById('paletteMobile');
        let dH = '', mH = '';
        Object.entries(soundLibrary).forEach(([key, sounds]) => {
          const cat = tracks.find(t => t.id === key);
          const chips = sounds.map(s => `<button class="sound-chip" style="background:${s.color}" onclick="selectBrush('${key}','${s.file}','${s.name}','${s.color}',this)">${s.name}</button>`).join('');
          dH += `<div class="palette-column"><strong>${cat.n}</strong>${chips}</div>`;
          mH += `<div class="category-item"><button style="width:100%;text-align:left;padding:12px;font-weight:900" onclick="toggleMob('${key}')">${cat.i} ${cat.n} ▼</button><div style="display:none;padding:8px;grid-template-columns:1fr 1fr 1fr;gap:5px" id="cc-${key}">${chips}</div></div>`;
        });
        desk.innerHTML = dH; mob.innerHTML = mH;
      }

      function toggleMob(k) { const el=document.getElementById('cc-'+k); el.style.display = el.style.display==='none'?'grid':'none'; }

      function selectBrush(cat, file, name, color, btn) {
        state.activeBrush = { cat, file, name, color };
        document.querySelectorAll('.sound-chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('status').textContent = `🖌️ КИСТЬ: ${name.toUpperCase()}`;
        preload(file).then(() => playNote(file));
      }

      function buildGrid() {
        const h = document.getElementById('gridHeader'), b = document.getElementById('gridBody');
        const isMob = window.innerWidth < 900;
        h.innerHTML = '<div class="track-label">ТРЕК</div>' + Array.from({length: state.steps}, (_, i) => `<div class="step">${i+1}</div>`).join('');
        b.innerHTML = tracks.map(t => `<div class="grid-row"><div class="track-label">${isMob ? t.i : t.n}</div>${Array.from({length: state.steps}, (_, i) => `<div class="cell" data-track="${t.id}" data-step="${i}" onclick="toggleCell(this)"></div>`).join('')}</div>`).join('');
      }

      function toggleCell(el) {
        const t = el.dataset.track, s = parseInt(el.dataset.step);
        if (state.sequence[t]?.[s]) {
          state.sequence[t][s] = false; el.classList.remove('active'); el.innerHTML = '';
        } else if (state.activeBrush && state.activeBrush.cat === t) {
          if (!state.sequence[t]) state.sequence[t] = {}; if (!state.soundMap[t]) state.soundMap[t] = {};
          state.sequence[t][s] = true; state.soundMap[t][s] = state.activeBrush;
          el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${state.activeBrush.color};border-radius:4px"></div>`;
        }
      }

      async function preload(f) { if (!audioCache[f]) { const r = await fetch(`./sounds/${f}.wav`); const b = await r.arrayBuffer(); audioCache[f] = await audioCtx.decodeAudioData(b); } }
      function playNote(f) { if (audioCache[f]) { const s = audioCtx.createBufferSource(); s.buffer = audioCache[f]; s.connect(audioCtx.destination); s.start(); } }

      function startPlayback() {
        if (state.isPlaying) return;
        state.isPlaying = true;
        const tick = () => {
          if (!state.isPlaying) return;
          tracks.forEach(t => { if (state.sequence[t.id]?.[state.currentStep]) playNote(state.soundMap[t.id][state.currentStep].file); });
          renderPlayhead();
          state.currentStep = (state.currentStep + 1) % state.steps;
          if (!document.getElementById('loop').checked && state.currentStep === 0) { stopPlayback(); return; }
          state.timerId = setTimeout(tick, (60000 / state.tempo) / 4);
        };
        tick();
      }

      function stopPlayback() { state.isPlaying = false; clearTimeout(state.timerId); state.currentStep = 0; renderPlayhead(); }
      function renderPlayhead() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('playhead')); if (state.isPlaying) document.querySelectorAll(`.cell[data-step="${state.currentStep}"]`).forEach(c => c.classList.add('playhead')); }
      function clearGrid() { state.sequence = {}; state.soundMap = {}; state.currentStep = 0; buildGrid(); }
      function changeSteps() { state.steps = parseInt(document.getElementById('stepsCount').value); clearGrid(); }
      function updateTempo(v) { state.tempo = v; document.getElementById('tempoVal').textContent = v; }

      function loadPreset(p) {
        clearGrid();
        const data = {
          beat: { s: 16, d: [{t:'drums',s:0,i:0},{t:'drums',s:4,i:0},{t:'drums',s:8,i:0},{t:'drums',s:12,i:0},{t:'drums',s:2,i:0},{t:'drums',s:6,i:0},{t:'drums',s:10,i:0},{t:'drums',s:14,i:0},{t:'drums',s:1,i:0},{t:'drums',s:3,i:0},{t:'drums',s:5,i:0},{t:'drums',s:7,i:0},{t:'drums',s:9,i:0},{t:'drums',s:11,i:0},{t:'drums',s:13,i:0},{t:'drums',s:15,i:0}] },
          // Восстановленные богатые шаблоны
          dance: { s: 32, d: [{t:'drums',s:0,i:0},{t:'drums',s:4,i:0},{t:'drums',s:8,i:0},{t:'drums',s:12,i:0},{t:'drums',s:16,i:0},{t:'drums',s:20,i:0},{t:'drums',s:24,i:0},{t:'drums',s:28,i:0},{t:'cymbals',s:2,i:0},{t:'cymbals',s:6,i:0},{t:'cymbals',s:10,i:0},{t:'cymbals',s:14,i:0},{t:'cymbals',s:18,i:0},{t:'cymbals',s:22,i:0},{t:'cymbals',s:26,i:0},{t:'cymbals',s:30,i:0},{t:'bass',s:2,i:0},{t:'bass',s:6,i:0},{t:'bass',s:10,i:0},{t:'bass',s:14,i:0},{t:'bass',s:18,i:0},{t:'bass',s:22,i:0},{t:'bass',s:26,i:0},{t:'bass',s:30,i:0},{t:'synth',s:0,i:0},{t:'synth',s:16,i:0}] },
          funk: { s: 32, d: [{t:'drums',s:0,i:1},{t:'drums',s:10,i:1},{t:'drums',s:16,i:1},{t:'brass',s:14,i:1},{t:'brass',s:15,i:1},{t:'brass',s:30,i:1},{t:'brass',s:31,i:1},{t:'bass',s:0,i:1},{t:'bass',s:3,i:1},{t:'bass',s:8,i:1},{t:'cymbals',s:0,i:2},{t:'cymbals',s:4,i:2},{t:'cymbals',s:8,i:2},{t:'cymbals',s:12,i:2},{t:'cymbals',s:16,i:2},{t:'cymbals',s:20,i:2},{t:'cymbals',s:24,i:2},{t:'cymbals',s:28,i:2},{t:'guitar',s:4,i:0},{t:'guitar',s:12,i:0},{t:'guitar',s:20,i:0},{t:'guitar',s:28,i:0}] }
        }[p];
        state.steps = data.s; buildGrid();
        data.d.forEach(n => {
          const snd = soundLibrary[n.t][n.i];
          state.sequence[n.t] = state.sequence[n.t] || {}; state.soundMap[n.t] = state.soundMap[n.t] || {};
          state.sequence[n.t][n.s] = true; state.soundMap[n.t][n.s] = { ...snd, cat: n.t };
          preload(snd.file).then(() => {
             const el = document.querySelector(`.cell[data-track="${n.t}"][data-step="${n.s}"]`);
             if (el) { el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${snd.color};border-radius:4px"></div>`; }
          });
        });
      }

      async function exportWav() { alert("Рендеринг WAV... Подождите 5 секунд."); }

      buildPalettes(); buildGrid();
      window.onresize = buildGrid;
    </script>
  </body>
</html>
