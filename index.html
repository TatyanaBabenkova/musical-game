<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Музыкальный Бриз</title>
    <style>
      :root {
        --accent: #3b82f6; --accent-2: #10b981; --danger: #ef4444;
        --glass: rgba(255, 255, 255, 0.12);
        --ui-bg: rgba(255, 255, 255, 0.85);
        --text: #1e293b; --border: rgba(0, 0, 0, 0.15);
      }
      
      /* ТЕМНАЯ ТЕМА */
      body.dark-theme {
        --glass: rgba(0, 0, 0, 0.4);
        --ui-bg: rgba(30, 41, 59, 0.9);
        --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
      }

      html, body { 
        margin: 0; padding: 0; min-height: 100vh; background-color: #000;
        background-image: url('./IMG/bg.png');
        background-size: cover; background-position: center;
        background-attachment: fixed; background-repeat: no-repeat;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        transition: background-color 0.3s;
      }

      /* ЗАСТАВКА */
      #overlay {
        position: fixed; inset: 0; z-index: 2000;
        background-image: url('./IMG/bg.png'); background-size: cover; background-position: center;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px; color: white;
      }
      #overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: -1; }
      #overlay h1 { font-size: clamp(1.8rem, 9vw, 4.5rem); margin-bottom: 10px; text-shadow: 0 8px 25px rgba(0,0,0,0.9); font-weight: 900; letter-spacing: -2px; line-height: 1; }
      #overlay p { max-width: 450px; line-height: 1.5; margin-bottom: 25px; font-size: 1.1rem; }
      
      .theme-toggle-btn { margin-bottom: 20px; padding: 10px 20px; border-radius: 30px; border: 2px solid white; background: transparent; color: white; font-weight: bold; cursor: pointer; }
      .start-btn { padding: 18px 50px; font-size: 1.3rem; background: var(--accent); color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: 900; box-shadow: 0 12px 30px rgba(0,0,0,0.5); }

      /* ПРИЛОЖЕНИЕ */
      .app { max-width: 1400px; margin: 0 auto; padding: 10px; display: none; color: var(--text); }
      .panel { 
        background: var(--glass); border-radius: 24px; padding: 20px; 
        backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.2);
      }

      .ui-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
      .ui-group { 
        background: var(--ui-bg); padding: 10px; border-radius: 16px; 
        border: 1px solid rgba(0,0,0,0.05); display: flex; gap: 8px; align-items: center;
      }
      .ui-group label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

      button, select, input { 
        padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); 
        background: white; font-weight: 800; cursor: pointer; font-size: 12px;
      }
      body.dark-theme button, body.dark-theme select { background: #1e293b; color: white; border-color: rgba(255,255,255,0.1); }
      .primary { background: var(--accent) !important; color: white !important; border: none; }
      .selected { outline: 3px solid #000; transform: scale(1.05); z-index: 5; }
      body.dark-theme .selected { outline-color: #fff; }

      /* СЕТКА */
      .grid-wrap { overflow-x: auto; border-radius: 16px; background: rgba(255,255,255,0.05); margin-bottom: 15px; border: 1px solid var(--border); }
      .grid-header, .grid-row { display: flex; min-width: max-content; }
      .track-label { 
        position: sticky; left: 0; width: 110px; background: var(--ui-bg); 
        z-index: 10; padding: 8px; font-weight: 900; font-size: 11px; border-right: 2px solid var(--border);
      }
      .cell, .step { width: 38px; height: 38px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
      .step { display: grid; place-items: center; font-size: 10px; font-weight: 900; background: rgba(255,255,255,0.2); }
      .cell.active { background: rgba(59, 130, 246, 0.7); }
      .cell.playhead { outline: 3px solid #fff; z-index: 5; background: rgba(255,255,255,0.2); }

      /* ИНВЕНТАРЬ */
      .palette-desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
      .palette-column { background: var(--glass); padding: 8px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); }
      .palette-column strong { display: block; text-align: center; font-size: 9px; margin-bottom: 6px; text-transform: uppercase; }
      .sound-chip { width: 100%; margin-bottom: 5px; padding: 10px 2px; border: none; border-radius: 8px; color: white; font-weight: 900; font-size: 10px; }

      @media (max-width: 900px) {
        .palette-desktop { display: none; }
        .track-label { width: 42px; font-size: 18px; text-align: center; padding: 2px; }
        .ui-group label { display: none; }
        .toolbar-one-line { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 3px; }
        .toolbar-one-line input[type="range"] { width: 60px; }
        .cell, .step { width: 32px; height: 32px; }
      }
    </style>
  </head>
  <body class="light-theme">

    <div id="overlay">
      <h1>МУЗЫКАЛЬНЫЙ БРИЗ</h1>
      <p>Создавай свою музыку в одно касание!<br><br>
      <b>Как играть:</b> Выбери инструмент внизу (он подсветится), а затем нажимай на клетки в таблице, чтобы расставить звуки.</p>
      
      <button class="theme-toggle-btn" onclick="toggleTheme()">🌓 СМЕНИТЬ ТЕМУ</button>
      <br>
      <button class="start-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

    <main class="app" id="mainApp">
      <section class="panel">
        <div class="ui-container">
            <div class="ui-group">
                <button id="playBtn" class="primary" onclick="startPlayback()">▶ PLAY</button>
                <button id="stopBtn" onclick="stopPlayback()" style="color:var(--danger)">■ STOP</button>
                <button onclick="exportWav()">💾 WAV</button>
                <button class="danger" onclick="clearGrid()">🗑️ ОЧИСТИТЬ</button>
            </div>
            <div class="ui-group">
                <label>Шаблоны</label>
                <button onclick="loadPreset('beat')">БИТ</button>
                <button onclick="loadPreset('dance')">ТАНЕЦ</button>
                <button onclick="loadPreset('funk')">ФАНК</button>
            </div>
            <div class="ui-group">
                <div class="toolbar-one-line">
                    <select id="stepsCount" onchange="changeSteps()"><option value="16">16 шаг.</option><option value="32" selected>32 шаг.</option></select>
                    <label style="display:flex; align-items:center; gap:2px; font-size:10px;"><input id="loop" type="checkbox" checked> ЛУП</label>
                    <div style="font-size:10px; font-weight:900">BPM: <input id="tempo" type="range" min="80" max="150" value="115" oninput="updateTempo(this.value)"> <span id="tempoVal">115</span></div>
                </div>
            </div>
        </div>

        <div class="grid-wrap">
          <div id="gridHeader" class="grid-header"></div>
          <div id="gridBody"></div>
        </div>

        <div id="status" style="text-align:center; font-weight:900; margin:8px; color:var(--accent); font-size:11px; text-transform:uppercase;">🖌️ Выбери инструмент и рисуй</div>

        <div class="palette-desktop" id="paletteDesktop"></div>
        <div id="paletteMobile" style="display:none"></div>
      </section>
    </main>

    <script>
      const soundLibrary = {
        drums: [ { name: 'Бочка', file: 'kick_1', color: '#ea580c' }, { name: 'Ломаный', file: 'kick_2', color: '#c2410c' }, { name: 'Глухой', file: 'kick_3', color: '#9a3412' } ],
        cymbals: [ { name: 'Хэт', file: 'hat_closed_1', color: '#eab308' }, { name: 'Клэп', file: 'clap_1', color: '#ca8a04' }, { name: 'Крэш', file: 'crash_1', color: '#a16207' } ],
        guitar: [ { name: 'Классика', file: 'guitar_acoustic', color: '#22c55e' }, { name: 'Электро', file: 'guitar_electro', color: '#16a34a' }, { name: 'Аккорд', file: 'guitar_chord', color: '#15803d' } ],
        synth: [ { name: 'Синт-Лид', file: 'synth_lead', color: '#0ea5e9' }, { name: 'Пэд', file: 'synth_pad', color: '#0284c7' }, { name: 'Арп', file: 'synth_arp', color: '#0369a1' } ],
        brass: [ { name: 'Сакс', file: 'sax_1', color: '#a855f7' }, { name: 'Труба', file: 'trumpet_1', color: '#9333ea' }, { name: 'Горн', file: 'horn_1', color: '#7e22ce' } ],
        bass: [ { name: 'Суб', file: 'bass_sub', color: '#ef4444' }, { name: 'Слэп', file: 'bass_slap', color: '#dc2626' }, { name: 'Синт', file: 'bass_synth', color: '#b91c1c' } ]
      };

      const tracks = [ {id:'drums', n:'УДАРНЫЕ', i:'🥁'}, {id:'cymbals', n:'ТАРЕЛКИ', i:'🔔'}, {id:'guitar', n:'ГИТАРА', i:'🎸'}, {id:'synth', n:'СИНТ', i:'🎹'}, {id:'brass', n:'ДУХОВЫЕ', i:'🎺'}, {id:'bass', n:'БАСС', i:'🎸'} ];
      let state = { steps: 32, currentStep: 0, isPlaying: false, activeBrush: null, sequence: {}, soundMap: {}, timerId: null, tempo: 115 };
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioCache = {};

      function startGame() { document.getElementById('overlay').style.display='none'; document.getElementById('mainApp').style.display='block'; if (audioCtx.state === 'suspended') audioCtx.resume(); }
      function toggleTheme() { document.body.classList.toggle('dark-theme'); }

      function buildPalettes() {
        const desk = document.getElementById('paletteDesktop'), mob = document.getElementById('paletteMobile');
        let dH = '', mH = '';
        Object.entries(soundLibrary).forEach(([key, sounds]) => {
          const cat = tracks.find(t => t.id === key);
          const chips = sounds.map(s => `<button class="sound-chip" style="background:${s.color}" onclick="selectBrush('${key}','${s.file}','${s.name}','${s.color}',this)">${s.name}</button>`).join('');
          dH += `<div class="palette-column"><strong>${cat.n}</strong>${chips}</div>`;
          mH += `<div class="category-item"><button style="width:100%;text-align:left;padding:12px;font-weight:900" onclick="toggleMob('${key}')">${cat.i} ${cat.n} ▼</button><div style="display:none;padding:8px;grid-template-columns:1fr 1fr 1fr;gap:5px" id="cc-${key}">${chips}</div></div>`;
        });
        desk.innerHTML = dH; mob.innerHTML = mH;
        if(window.innerWidth < 900) mob.style.display = 'block';
      }

      // ЛОГИКА АККОРДЕОНА: Только одна группа открыта за раз
      function toggleMob(k) {
        const allContents = document.querySelectorAll('[id^="cc-"]');
        const target = document.getElementById('cc-' + k);
        const isCurrentlyOpen = target.style.display === 'grid';

        allContents.forEach(c => c.style.display = 'none'); // Закрыть всё
        if (!isCurrentlyOpen) target.style.display = 'grid'; // Открыть нужный, если он был закрыт
      }

      function selectBrush(cat, file, name, color, btn) {
        state.activeBrush = { cat, file, name, color };
        document.querySelectorAll('.sound-chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('status').textContent = `🖌️ КИСТЬ: ${name.toUpperCase()}`;
        preload(file).then(() => playNote(file));
      }

      function buildGrid() {
        const h = document.getElementById('gridHeader'), b = document.getElementById('gridBody');
        const isMob = window.innerWidth < 900;
        h.innerHTML = '<div class="track-label">ТРЕК</div>' + Array.from({length: state.steps}, (_, i) => `<div class="step">${i+1}</div>`).join('');
        b.innerHTML = tracks.map(t => `<div class="grid-row"><div class="track-label">${isMob ? t.i : t.n}</div>${Array.from({length: state.steps}, (_, i) => `<div class="cell" data-track="${t.id}" data-step="${i}" onclick="toggleCell(this)"></div>`).join('')}</div>`).join('');
      }

      function toggleCell(el) {
        const t = el.dataset.track, s = parseInt(el.dataset.step);
        if (state.sequence[t]?.[s]) {
          state.sequence[t][s] = false; el.classList.remove('active'); el.innerHTML = '';
        } else if (state.activeBrush && state.activeBrush.cat === t) {
          state.sequence[t] = state.sequence[t] || {}; state.soundMap[t] = state.soundMap[t] || {};
          state.sequence[t][s] = true; state.soundMap[t][s] = state.activeBrush;
          el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${state.activeBrush.color};border-radius:4px"></div>`;
        }
      }

      async function preload(f) { if (!audioCache[f]) { try { const r = await fetch(`./sounds/${f}.wav`); const b = await r.arrayBuffer(); audioCache[f] = await audioCtx.decodeAudioData(b); } catch(e){} } }
      function playNote(f) { if (audioCache[f]) { const s = audioCtx.createBufferSource(); s.buffer = audioCache[f]; s.connect(audioCtx.destination); s.start(); } }

      function startPlayback() {
        if (state.isPlaying) return;
        state.isPlaying = true;
        const tick = () => {
          if (!state.isPlaying) return;
          tracks.forEach(t => { if (state.sequence[t.id]?.[state.currentStep]) playNote(state.soundMap[t.id][state.currentStep].file); });
          renderPlayhead();
          state.currentStep = (state.currentStep + 1) % state.steps;
          if (!document.getElementById('loop').checked && state.currentStep === 0) { stopPlayback(); return; }
          state.timerId = setTimeout(tick, (60000 / state.tempo) / 4);
        }; tick();
      }

      function stopPlayback() { state.isPlaying = false; clearTimeout(state.timerId); state.currentStep = 0; renderPlayhead(); }
      function renderPlayhead() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('playhead')); if (state.isPlaying) document.querySelectorAll(`.cell[data-step="${state.currentStep}"]`).forEach(c => c.classList.add('playhead')); }
      function clearGrid() { state.sequence = {}; state.soundMap = {}; state.currentStep = 0; buildGrid(); }
      function changeSteps() { state.steps = parseInt(document.getElementById('stepsCount').value); clearGrid(); }
      function updateTempo(v) { state.tempo = v; document.getElementById('tempoVal').textContent = v; }

      function loadPreset(p) {
        clearGrid();
        const data = {
          beat: { s: 16, d: [{t:'drums',s:0,i:0},{t:'drums',s:4,i:0},{t:'drums',s:8,i:0},{t:'drums',s:12,i:0},{t:'cymbals',s:2,i:0},{t:'cymbals',s:6,i:0},{t:'cymbals',s:10,i:0},{t:'cymbals',s:14,i:0},{t:'cymbals',s:4,i:1},{t:'cymbals',s:12,i:1}] },
          dance: { s: 32, d: [{t:'drums',s:0,i:0},{t:'drums',s:4,i:0},{t:'drums',s:8,i:0},{t:'drums',s:12,i:0},{t:'drums',s:16,i:0},{t:'drums',s:20,i:0},{t:'drums',s:24,i:0},{t:'drums',s:28,i:0},{t:'cymbals',s:4,i:1},{t:'cymbals',s:12,i:1},{t:'cymbals',s:20,i:1},{t:'cymbals',s:28,i:1},{t:'cymbals',s:2,i:0},{t:'cymbals',s:10,i:0},{t:'bass',s:2,i:2},{t:'bass',s:6,i:2},{t:'bass',s:10,i:2},{t:'bass',s:14,i:2},{t:'synth',s:0,i:1}] },
          funk: { s: 32, d: [{t:'drums',s:0,i:1},{t:'drums',s:10,i:1},{t:'drums',s:16,i:1},{t:'drums',s:26,i:1},{t:'brass',s:14,i:1},{t:'brass',s:15,i:1},{t:'brass',s:30,i:1},{t:'brass',s:31,i:1},{t:'bass',s:0,i:1},{t:'bass',s:3,i:1},{t:'bass',s:8,i:1},{t:'guitar',s:4,i:2},{t:'guitar',s:12,i:2},{t:'guitar',s:20,i:2},{t:'guitar',s:28,i:2}] }
        }[p];
        state.steps = data.s; buildGrid();
        data.d.forEach(n => {
          const snd = soundLibrary[n.t][n.i];
          state.sequence[n.t] = state.sequence[n.t] || {}; state.soundMap[n.t] = state.soundMap[n.t] || {};
          state.sequence[n.t][n.s] = true; state.soundMap[n.t][n.s] = { ...snd, cat: n.t };
          preload(snd.file).then(() => {
             const el = document.querySelector(`.cell[data-track="${n.t}"][data-step="${n.s}"]`);
             if (el) { el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${snd.color};border-radius:4px"></div>`; }
          });
        });
      }

      async function exportWav() {
        const totalDuration = 30, sr = 44100;
        const offlineCtx = new OfflineAudioContext(2, sr * totalDuration, sr);
        const stepDur = (60 / state.tempo) / 4;
        
        for (let loop = 0; loop < Math.ceil(totalDuration / (state.steps * stepDur)); loop++) {
          let loopOffset = loop * state.steps * stepDur;
          tracks.forEach(track => {
            if (state.sequence[track.id]) {
              for (let step in state.sequence[track.id]) {
                if (state.sequence[track.id][step]) {
                  let start = loopOffset + step * stepDur;
                  if (start >= totalDuration) continue;
                  let buffer = audioCache[state.soundMap[track.id][step].file];
                  if (buffer) {
                    let source = offlineCtx.createBufferSource();
                    source.buffer = buffer; source.connect(offlineCtx.destination);
                    source.start(start);
                  }
                }
              }
            }
          });
        }
        const renderedBuffer = await offlineCtx.startRendering();
        const blob = audioBufferToWav(renderedBuffer);
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
        link.download = 'my_hit.wav'; link.click();
      }

      function audioBufferToWav(buffer) {
        let numChannels = buffer.numberOfChannels, sampleRate = buffer.sampleRate;
        let result = new Int16Array(buffer.length * numChannels);
        for (let i = 0; i < numChannels; i++) {
          let channel = buffer.getChannelData(i);
          for (let j = 0; j < channel.length; j++) result[j * numChannels + i] = channel[j] * 32767;
        }
        let header = new ArrayBuffer(44), view = new DataView(header);
        const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
        writeString(0, 'RIFF'); view.setUint32(4, 36 + result.byteLength, true); writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * numChannels * 2, true);
        view.setUint16(32, numChannels * 2, true); view.setUint16(34, 16, true); writeString(36, 'data'); view.setUint32(40, result.byteLength, true);
        return new Blob([header, result], { type: 'audio/wav' });
      }

      buildPalettes(); buildGrid();
      window.onresize = buildGrid;
    </script>
  </body>
</html>
