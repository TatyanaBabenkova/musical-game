<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Музыкальный Бриз</title>
    <style>
      :root {
        --accent: #3b82f6; --accent-2: #10b981;
        --danger: #ef4444; --text: #1e293b;
        --glass: rgba(255, 255, 255, 0.35); /* Усиленная прозрачность */
      }
      
      html, body { 
        margin: 0; padding: 0; min-height: 100vh;
        background-color: #f8fafc;
        background-image: url('./IMG/bg.png');
        background-size: cover; background-position: center;
        background-attachment: fixed; background-repeat: no-repeat;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* ЗАСТАВКА С ТЕНЯМИ И ФОНОМ */
      #overlay {
        position: fixed; inset: 0; z-index: 1000;
        background-image: url('./IMG/bg.png');
        background-size: cover; background-position: center;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px;
      }
      #overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: -1; }
      
      #overlay h1 { 
        color: white; font-size: 4rem; margin-bottom: 10px; 
        text-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 30px rgba(59, 130, 246, 0.5);
        font-weight: 900; letter-spacing: -2px;
      }
      #overlay p { 
        max-width: 500px; line-height: 1.6; margin-bottom: 30px; 
        color: white; font-size: 1.2rem; font-weight: 500;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }
      
      .start-btn { 
        padding: 20px 60px; font-size: 1.5rem; background: var(--accent); 
        color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        box-shadow: 0 15px 30px rgba(0,0,0,0.3); transition: 0.3s;
      }

      .app { max-width: 1400px; margin: 0 auto; padding: 15px; display: none; position: relative; z-index: 1; }
      .panel { 
        background: var(--glass); border-radius: 20px; padding: 20px; 
        backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4);
      }

      .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
      button, select, input { 
        padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); 
        background: rgba(255,255,255,0.8); font-weight: 700; cursor: pointer;
      }
      .primary { background: var(--accent); color: white; border: none; }
      .selected { outline: 3px solid #000; transform: scale(1.05); z-index: 5; }

      /* СЕТКА С ПОЛНОЙ ПРОЗРАЧНОСТЬЮ */
      .grid-wrap { overflow-x: auto; border-radius: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
      .grid-header, .grid-row { display: flex; min-width: max-content; }
      .track-label { 
        position: sticky; left: 0; width: 130px; background: rgba(255, 255, 255, 0.85); 
        backdrop-filter: blur(5px); z-index: 10; padding: 12px; font-weight: 900; font-size: 12px; 
        border-right: 2px solid rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1);
      }
      .cell, .step { width: 40px; height: 40px; border-right: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); }
      .step { display: grid; place-items: center; font-size: 11px; font-weight: 800; background: rgba(255,255,255,0.2); }
      .cell.active { background: rgba(59, 130, 246, 0.5); }
      .cell.playhead { box-shadow: inset 0 0 0 2px var(--accent); background: rgba(59, 130, 246, 0.2); }

      /* АДАПТИВНОСТЬ ПАЛИТРЫ */
      .palette-desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
      .palette-mobile { display: none; }
      .palette-column { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; }
      .sound-chip { width: 100%; margin-bottom: 8px; padding: 12px 5px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

      @media (max-width: 900px) {
        .palette-desktop { display: none; } .palette-mobile { display: block; }
        .category-item { margin-bottom: 8px; border-radius: 10px; overflow: hidden; background: white; }
        .category-trigger { width: 100%; padding: 15px; text-align: left; border: none; font-weight: 900; display: flex; justify-content: space-between; }
        .category-content { display: none; padding: 10px; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .category-item.open .category-content { display: grid; }
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1>МУЗЫКАЛЬНЫЙ БРИЗ</h1>
      <p>Твой личный поток звука и творчества.<br><br>
      <b>Управление:</b> Выбери инструмент внизу, а затем расставляй его по сетке кликами. Повторный клик удаляет звук.</p>
      <button class="start-btn" onclick="startGame()">ПОЕХАЛИ!</button>
    </div>

    <main class="app" id="mainApp">
      <section class="panel">
        <div class="toolbar">
          <button id="playBtn" class="primary" onclick="startPlayback()">▶ PLAY</button>
          <button id="stopBtn" onclick="stopPlayback()" style="color:var(--danger)">■ STOP</button>
          <button onclick="loadPreset('beat')">БИТ</button>
          <button onclick="loadPreset('dance')">ТАНЕЦ</button>
          <button onclick="loadPreset('funk')">ФАНК</button>
          <button class="danger" onclick="clearGrid()">ОЧИСТИТЬ</button>
          <select id="stepsCount" onchange="changeSteps()">
            <option value="16">16</option>
            <option value="32" selected>32</option>
          </select>
        </div>

        <div class="grid-wrap">
          <div id="gridHeader" class="grid-header"></div>
          <div id="gridBody"></div>
        </div>

        <div id="status" style="text-align:center; font-weight:800; margin:15px; color:var(--accent)">🖌️ ВЫБЕРИ ИНСТРУМЕНТ ВНИЗУ</div>

        <div class="palette-desktop" id="paletteDesktop"></div>
        <div class="palette-mobile" id="paletteMobile"></div>
      </section>
    </main>

    <script>
      const soundLibrary = {
        drums: [ { name: 'Бочка', file: 'kick_1', color: '#ea580c' }, { name: 'Ломаный', file: 'kick_2', color: '#c2410c' }, { name: 'Глухой', file: 'kick_3', color: '#9a3412' } ],
        cymbals: [ { name: 'Хэт', file: 'hat_closed_1', color: '#eab308' }, { name: 'Клэп', file: 'clap_1', color: '#ca8a04' }, { name: 'Крэш', file: 'crash_1', color: '#a16207' } ],
        guitar: [ { name: 'Классика', file: 'guitar_acoustic', color: '#22c55e' }, { name: 'Электро', file: 'guitar_electro', color: '#16a34a' }, { name: 'Аккорд', file: 'guitar_chord', color: '#15803d' } ],
        synth: [ { name: 'Синт', file: 'synth_lead', color: '#0ea5e9' }, { name: 'Пэд', file: 'synth_pad', color: '#0284c7' }, { name: 'Арп', file: 'synth_arp', color: '#0369a1' } ],
        brass: [ { name: 'Сакс', file: 'sax_1', color: '#a855f7' }, { name: 'Труба', file: 'trumpet_1', color: '#9333ea' }, { name: 'Горн', file: 'horn_1', color: '#7e22ce' } ],
        bass: [ { name: 'Суб', file: 'bass_sub', color: '#ef4444' }, { name: 'Слэп', file: 'bass_slap', color: '#dc2626' }, { name: 'Синт', file: 'bass_synth', color: '#b91c1c' } ]
      };

      const tracks = [ {id:'drums', name:'УДАРНЫЕ'}, {id:'cymbals', name:'ТАРЕЛКИ'}, {id:'guitar', name:'ГИТАРА'}, {id:'synth', name:'СИНТ'}, {id:'brass', name:'ДУХОВЫЕ'}, {id:'bass', name:'БАСС'} ];
      const catNames = { drums: '🥁 УДАРНЫЕ', cymbals: '🔔 ТАРЕЛКИ', guitar: '🎸 ГИТАРА', synth: '🎹 СИНТ', brass: '🎺 ДУХОВЫЕ', bass: '🎸 БАСС' };

      let state = { steps: 32, currentStep: 0, isPlaying: false, activeBrush: null, sequence: {}, soundMap: {}, timerId: null };
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioCache = {};

      function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function buildPalettes() {
        const desk = document.getElementById('paletteDesktop');
        const mob = document.getElementById('paletteMobile');
        let deskH = '', mobH = '';

        Object.entries(soundLibrary).forEach(([key, sounds]) => {
          const chips = sounds.map(s => `<button class="sound-chip" style="background:${s.color}" onclick="selectBrush('${key}', '${s.file}', '${s.name}', '${s.color}', this)">${s.name}</button>`).join('');
          deskH += `<div class="palette-column"><strong>${catNames[key]}</strong>${chips}</div>`;
          mobH += `<div class="category-item" id="cat-m-${key}"><button class="category-trigger" onclick="toggleMob('${key}')">${catNames[key]} <span>▼</span></button><div class="category-content">${chips}</div></div>`;
        });
        desk.innerHTML = deskH; mob.innerHTML = mobH;
      }

      function toggleMob(k) {
        const el = document.getElementById(`cat-m-${k}`);
        const open = el.classList.contains('open');
        document.querySelectorAll('.category-item').forEach(c => c.classList.remove('open'));
        if (!open) el.classList.add('open');
      }

      function selectBrush(cat, file, name, color, btn) {
        state.activeBrush = { cat, file, name, color };
        document.querySelectorAll('.sound-chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('status').textContent = `🖌️ КИСТЬ: ${name.toUpperCase()}`;
        preload(file);
      }

      function buildGrid() {
        const h = document.getElementById('gridHeader'), b = document.getElementById('gridBody');
        h.innerHTML = '<div class="track-label">ТРЕК</div>' + Array.from({length: state.steps}, (_, i) => `<div class="step">${i+1}</div>`).join('');
        b.innerHTML = tracks.map(t => `<div class="grid-row"><div class="track-label">${t.name}</div>${Array.from({length: state.steps}, (_, i) => `<div class="cell" data-track="${t.id}" data-step="${i}" onclick="toggleCell(this)"></div>`).join('')}</div>`).join('');
      }

      function toggleCell(el) {
        const t = el.dataset.track, s = parseInt(el.dataset.step);
        if (state.sequence[t]?.[s]) {
          state.sequence[t][s] = false; el.classList.remove('active'); el.innerHTML = '';
        } else if (state.activeBrush && state.activeBrush.cat === t) {
          if (!state.sequence[t]) state.sequence[t] = {}; if (!state.soundMap[t]) state.soundMap[t] = {};
          state.sequence[t][s] = true; state.soundMap[t][s] = state.activeBrush;
          el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${state.activeBrush.color};border-radius:4px"></div>`;
        }
      }

      async function preload(f) { if (!audioCache[f]) { const r = await fetch(`./sounds/${f}.wav`); const b = await r.arrayBuffer(); audioCache[f] = await audioCtx.decodeAudioData(b); } }

      function playNote(f) { if (audioCache[f]) { const s = audioCtx.createBufferSource(); s.buffer = audioCache[f]; s.connect(audioCtx.destination); s.start(); } }

      function startPlayback() {
        if (state.isPlaying) return;
        state.isPlaying = true;
        document.getElementById('playBtn').dataset.state = 'active';
        state.timerId = setInterval(() => {
          tracks.forEach(t => { if (state.sequence[t.id]?.[state.currentStep]) playNote(state.soundMap[t.id][state.currentStep].file); });
          renderPlayhead();
          state.currentStep = (state.currentStep + 1) % state.steps;
        }, 150);
      }

      function stopPlayback() {
        state.isPlaying = false; clearInterval(state.timerId); state.currentStep = 0;
        document.getElementById('playBtn').dataset.state = ''; renderPlayhead();
      }

      function renderPlayhead() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('playhead'));
        if (state.isPlaying) document.querySelectorAll(`.cell[data-step="${state.currentStep}"]`).forEach(c => c.classList.add('playhead'));
      }

      function clearGrid() { state.sequence = {}; buildGrid(); }

      function changeSteps() { state.steps = parseInt(document.getElementById('stepsCount').value); clearGrid(); }

      function loadPreset(p) {
        const presets = {
          beat: { steps: 16, data: [{t:'drums', s:0}, {t:'drums', s:4}, {t:'drums', s:8}, {t:'drums', s:12}] },
          dance: { steps: 32, data: [{t:'drums', s:0}, {t:'drums', s:4}, {t:'drums', s:8}, {t:'drums', s:12}, {t:'drums', s:16}, {t:'drums', s:20}] },
          funk: { steps: 32, data: [{t:'drums', s:0}, {t:'drums', s:10}, {t:'drums', s:16}, {t:'brass', s:14}, {t:'brass', s:15}] }
        };
        const cur = presets[p]; state.steps = cur.steps; clearGrid();
        cur.data.forEach(n => {
          if (!state.sequence[n.t]) state.sequence[n.t] = {};
          state.sequence[n.t][n.s] = true;
          const sound = soundLibrary[n.t][0];
          state.soundMap[n.t] = state.soundMap[n.t] || {};
          state.soundMap[n.t][n.s] = { ...sound, cat: n.t };
          preload(sound.file);
        });
        buildGrid();
        tracks.forEach(t => {
          for(let s in state.sequence[t.id]) {
            if(state.sequence[t.id][s]) {
              const el = document.querySelector(`.cell[data-track="${t.id}"][data-step="${s}"]`);
              el.classList.add('active'); el.innerHTML = `<div style="width:100%;height:100%;background:${state.soundMap[t.id][s].color};border-radius:4px"></div>`;
            }
          }
        });
      }

      buildPalettes(); buildGrid();
    </script>
  </body>
</html>
