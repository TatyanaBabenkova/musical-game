<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Музыкальный Бриз</title>
    <style>
      :root {
        --accent: #3b82f6; --accent-2: #10b981;
        --danger: #ef4444; --text: #1e293b;
        /* Переменная для прозрачности панелей */
        --glass: rgba(255, 255, 255, 0.6); 
      }
      
      html, body { 
        margin: 0; padding: 0; min-height: 100vh;
        background-color: #f8fafc;
        /* ФИКСИРОВАННЫЙ ФОН */
        background-image: url('./IMG/bg.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* ЗАСТАВКА */
      #overlay {
        position: fixed; inset: 0; z-index: 1000;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(15px);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px;
      }
      #overlay h1 { color: var(--accent); font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
      #overlay p { max-width: 500px; line-height: 1.6; margin-bottom: 30px; color: var(--text); font-size: 1.1rem; }
      
      .start-btn { 
        padding: 18px 50px; font-size: 1.3rem; background: var(--accent); 
        color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); transition: 0.3s;
      }
      .start-btn:hover { transform: scale(1.05); background: #2563eb; }

      .app { max-width: 1400px; margin: 0 auto; padding: 15px; display: none; position: relative; z-index: 1; }
      
      /* ЭФФЕКТ СТЕКЛА ДЛЯ ВСЕХ ПАНЕЛЕЙ */
      .panel { 
        background: var(--glass); 
        border-radius: 20px; padding: 20px; 
        backdrop-filter: blur(12px); 
        border: 1px solid rgba(255,255,255,0.4);
        box-shadow: 0 8px 32px rgba(0,0,0,0.05); 
      }

      .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
      .toolbar-group { display: flex; gap: 8px; align-items: center; }
      
      button, select, input { 
        padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); 
        background: rgba(255,255,255,0.8); font-weight: 600; cursor: pointer; font-size: 14px;
      }
      .primary { background: var(--accent); color: white; border: none; }

      /* СЕТКА С ПРОЗРАЧНЫМИ ЯЧЕЙКАМИ */
      .grid-wrap { 
        overflow-x: auto; border-radius: 15px; 
        background: rgba(255,255,255,0.2); /* Почти прозрачный фон сетки */
        border: 1px solid rgba(255,255,255,0.3);
        margin-bottom: 20px;
      }
      .grid-header, .grid-row { display: flex; min-width: max-content; }
      .track-label { 
        position: sticky; left: 0; width: 130px; 
        background: rgba(248, 250, 252, 0.8); 
        backdrop-filter: blur(5px);
        z-index: 10; padding: 12px; font-weight: bold; font-size: 13px; 
        border-right: 1px solid rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.05);
      }
      .cell, .step { width: 42px; height: 42px; border-right: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); }
      .step { display: grid; place-items: center; font-size: 11px; color: #64748b; font-weight: bold; background: rgba(255,255,255,0.3); }
      
      .cell { background: rgba(255,255,255,0.1); transition: 0.2s; }
      .cell:hover { background: rgba(255,255,255,0.4); }
      .cell.active { background: rgba(59, 130, 246, 0.4); }
      .cell.playhead { outline: 2px solid var(--accent); outline-offset: -2px; background: rgba(59, 130, 246, 0.1); }

      /* ПАЛИТРА ДЛЯ КОМПЬЮТЕРА (РАЗВЕРНУТАЯ) */
      .palette-desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-top: 20px; }
      .palette-column { background: rgba(255,255,255,0.3); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.4); }
      .palette-column strong { display: block; text-align: center; margin-bottom: 10px; font-size: 12px; color: var(--muted); }

      /* ПАЛИТРА ДЛЯ ТЕЛЕФОНА (АККОРДЕОН) */
      .palette-mobile { display: none; margin-top: 15px; }
      .category-item { margin-bottom: 8px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4); }
      .category-trigger { 
        width: 100%; padding: 14px; text-align: left; background: rgba(255,255,255,0.6); 
        border: none; font-weight: bold; display: flex; justify-content: space-between;
      }
      .category-content { display: none; padding: 12px; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.2); }
      .category-item.open .category-content { display: grid; }
      
      .sound-chip { 
        padding: 12px 5px; border: none; border-radius: 8px; color: white; 
        font-size: 12px; font-weight: bold; text-align: center; cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
      }
      .sound-chip.selected { transform: scale(1.1); ring: 3px solid #000; outline: 3px solid #000; z-index: 5; }

      /* АДАПТИВНОСТЬ */
      @media (max-width: 900px) {
        .palette-desktop { display: none; }
        .palette-mobile { display: block; }
        .toolbar { justify-content: center; }
        .track-label { width: 90px; font-size: 11px; }
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1 id="titleDisplay">МУЗЫКАЛЬНЫЙ БРИЗ</h1>
      <p>Почувствуй поток звука! <br><br>
      <b>Инструкция:</b> Выбери инструмент внизу (он подсветится), а затем нажимай на клетки в таблице, чтобы расставить звуки. Повторный клик удаляет звук.</p>
      <button class="start-btn" onclick="startGame()">НАЧАТЬ ТВОРЧЕСТВО</button>
    </div>

    <main class="app" id="mainApp">
      <section class="panel">
        <div class="toolbar">
          <div class="toolbar-group">
            <button id="playBtn" class="primary">▶ PLAY</button>
            <button id="stopBtn" style="color:var(--danger)">■ STOP</button>
            <button class="preset-btn" onclick="loadPreset('dance')">ТАНЕЦ</button>
            <button class="preset-btn" onclick="loadPreset('funk')">ФАНК</button>
            <button id="clearBtn" class="danger" onclick="clearGrid()">ОЧИСТИТЬ</button>
          </div>
          <div class="toolbar-group">
            <select id="stepsCount" onchange="changeLength()">
              <option value="16">16 шагов</option>
              <option value="32" selected>32 шага</option>
            </select>
            <input id="trackName" type="text" value="Мой Хит" style="width:120px">
          </div>
        </div>

        <div class="fx-row" style="display:flex; gap:20px; margin-bottom:20px; font-weight:bold; font-size:13px">
          <div>ТЕМП: <input id="tempo" type="range" min="80" max="150" value="115"> <span id="tempoValue">115</span></div>
          <div><label><input id="loop" type="checkbox" checked> ЦИКЛ</label></div>
        </div>

        <div class="grid-wrap">
          <div id="gridHeader" class="grid-header"></div>
          <div id="gridBody"></div>
        </div>

        <div id="status" style="font-size:12px; margin-bottom:15px; color:var(--accent); font-weight:bold; text-align:center;">
          🖌️ Выбери инструмент ниже, чтобы начать рисовать музыку
        </div>

        <div class="palette-desktop" id="paletteDesktop"></div>

        <div class="palette-mobile" id="paletteMobile"></div>
      </section>
    </main>

    <script>
      const soundLibrary = {
        drums: [ { name: 'Бочка', file: 'kick_1', color: '#ea580c' }, { name: 'Ломаный', file: 'kick_2', color: '#c2410c' }, { name: 'Глухой', file: 'kick_3', color: '#9a3412' } ],
        cymbals: [ { name: 'Хэт', file: 'hat_closed_1', color: '#eab308' }, { name: 'Клэп', file: 'clap_1', color: '#ca8a04' }, { name: 'Крэш', file: 'crash_1', color: '#a16207' } ],
        guitar: [ { name: 'Классика', file: 'guitar_acoustic', color: '#22c55e' }, { name: 'Электро', file: 'guitar_electro', color: '#16a34a' }, { name: 'Аккорд', file: 'guitar_chord', color: '#15803d' } ],
        synth: [ { name: 'Синт-Лид', file: 'synth_lead', color: '#0ea5e9' }, { name: 'Пэд', file: 'synth_pad', color: '#0284c7' }, { name: 'Арп', file: 'synth_arp', color: '#0369a1' } ],
        brass: [ { name: 'Сакс', file: 'sax_1', color: '#a855f7' }, { name: 'Труба', file: 'trumpet_1', color: '#9333ea' }, { name: 'Горн', file: 'horn_1', color: '#7e22ce' } ],
        bass: [ { name: 'Суб', file: 'bass_sub', color: '#ef4444' }, { name: 'Слэп', file: 'bass_slap', color: '#dc2626' }, { name: 'Синт', file: 'bass_synth', color: '#b91c1c' } ]
      };

      const tracks = [ {id:'drums', name:'УДАРНЫЕ'}, {id:'cymbals', name:'ТАРЕЛКИ'}, {id:'guitar', name:'ГИТАРА'}, {id:'synth', name:'СИНТ'}, {id:'brass', name:'ДУХОВЫЕ'}, {id:'bass', name:'БАСС'} ];
      const catNames = { drums: '🥁 УДАРНЫЕ', cymbals: '🔔 ТАРЕЛКИ', guitar: '🎸 ГИТАРА', synth: '🎹 СИНТ', brass: '🎺 ДУХОВЫЕ', bass: '🎸 БАСС' };

      let state = { steps: 32, currentStep: 0, isPlaying: false, activeBrush: null, sequence: {}, soundMap: {} };

      function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
      }

      function buildPalettes() {
        const desk = document.getElementById('paletteDesktop');
        const mob = document.getElementById('paletteMobile');
        
        let deskHTML = '';
        let mobHTML = '';

        Object.entries(soundLibrary).forEach(([key, sounds]) => {
          const chips = sounds.map(s => `<button class="sound-chip" style="background:${s.color}" onclick="selectBrush('${key}', '${s.file}', '${s.name}', '${s.color}', this)">${s.name}</button>`).join('');
          
          deskHTML += `<div class="palette-column"><strong>${catNames[key]}</strong>${chips}</div>`;
          mobHTML += `
            <div class="category-item" id="cat-mob-${key}">
              <button class="category-trigger" onclick="toggleMobCategory('${key}')">${catNames[key]} <span>▼</span></button>
              <div class="category-content">${chips}</div>
            </div>`;
        });

        desk.innerHTML = deskHTML;
        mob.innerHTML = mobHTML;
      }

      function toggleMobCategory(key) {
        const el = document.getElementById(`cat-mob-${key}`);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.category-item').forEach(c => c.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
      }

      function selectBrush(cat, file, name, color, btn) {
        state.activeBrush = { cat, file, name, color };
        document.querySelectorAll('.sound-chip').forEach(b => b.classList.remove('selected'));
        // Выделяем кнопку и на ПК и на мобилке (через класс)
        document.querySelectorAll(`button[onclick*="'${file}'"]`).forEach(b => b.classList.add('selected'));
        document.getElementById('status').textContent = `🖌️ Инструмент: ${name}. Кликай по дорожке "${catNames[cat]}"`;
      }

      function buildGrid() {
        const header = document.getElementById('gridHeader');
        const body = document.getElementById('gridBody');
        header.innerHTML = '<div class="track-label">ИНСТРУМЕНТ</div>' + Array.from({length: state.steps}, (_, i) => `<div class="step">${i+1}</div>`).join('');
        body.innerHTML = tracks.map(t => `
          <div class="grid-row">
            <div class="track-label">${t.name}</div>
            ${Array.from({length: state.steps}, (_, i) => `<div class="cell" data-track="${t.id}" data-step="${i}" onclick="toggleCell(this)"></div>`).join('')}
          </div>
        `).join('');
      }

      function toggleCell(el) {
        const t = el.dataset.track; const s = parseInt(el.dataset.step);
        if (state.sequence[t]?.[s]) {
          state.sequence[t][s] = false; el.classList.remove('active'); el.innerHTML = '';
        } else if (state.activeBrush && state.activeBrush.cat === t) {
          if (!state.sequence[t]) state.sequence[t] = {}; 
          state.sequence[t][s] = true;
          el.classList.add('active'); 
          el.innerHTML = `<div style="width:100%; height:100%; background:${state.activeBrush.color}; border-radius:4px; border:1px solid rgba(0,0,0,0.2)"></div>`;
        }
      }

      function clearGrid() {
        state.sequence = {};
        document.querySelectorAll('.cell').forEach(c => { c.classList.remove('active'); c.innerHTML = ''; });
      }

      // Инициализация
      buildPalettes();
      buildGrid();
    </script>
  </body>
</html>
